# RS256 public key + AES-256 encryption key sourced from AWS Secrets Manager via
# the existing `aws-secrets-manager` SecretStore (external-secret.yaml). Together
# with the private key they satisfy JwtProperties.loadKeys() — the app fails fast
# at boot unless JWT_PUBLIC_KEY_PATH and JWT_ENCRYPTION_KEY are both set.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: jwt-rs256-public-key
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: jwt-rs256-public-key
    creationPolicy: Owner
  data:
    - secretKey: public_key.pem
      remoteRef:
        key: danteplanner/jwt/rs256-public-key
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: jwt-encryption-key
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: jwt-encryption-key
    creationPolicy: Owner
  data:
    - secretKey: encryption_key
      remoteRef:
        key: danteplanner/jwt/encryption-key
