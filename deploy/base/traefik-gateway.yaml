# Traefik via Gateway API (Gateway + HTTPRoute) — ingress-nginx is retired.
# Traefik streams SSE natively (no proxy-buffering gotcha), so no annotation is
# needed to keep the event stream unbuffered.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: web
spec:
  gatewayClassName: traefik
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        # Cloudflare Authenticated Origin Pull (mTLS) is the real gate; the
        # origin cert + client-CA trust live in this secret (operator-populated).
        certificateRefs:
          - kind: Secret
            name: origin-tls
      allowedRoutes:
        namespaces:
          from: Same
---
# Application traffic. In Phase 14 the cross-region Traefik failover service
# attaches HERE (connection-failure only). SSE flows through natively.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: backend
spec:
  parentRefs:
    - name: web
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: backend
          port: 8080
---
# GA health check target: /healthz-local → LOCAL Spring readiness only. The
# fallback route is deliberately excluded so a region serving via cross-region
# fallback looks unhealthy and GA routes clients direct (requirements: Entry plane).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: healthz-local
spec:
  parentRefs:
    - name: web
  rules:
    - matches:
        - path:
            type: Exact
            value: /healthz-local
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /actuator/health/readiness
      backendRefs:
        - name: backend
          port: 8080
---
# Traefik CRD (applied at cluster sync; not Gateway API, so kustomize does not
# schema-validate it). Client-cert policy for the 443 listener — Traefik applies
# the TLSOption named `default` in the Gateway's namespace to its listeners.
#
# VerifyClientCertIfGiven, NOT RequireAndVerifyClientCert: Global Accelerator
# health-checks /healthz-local DIRECTLY and cannot present Cloudflare's origin-pull
# client cert, so a hard requirement would fail every health check and blackhole
# the region. Verify-if-given lets the certless GA prober (SG-restricted to the GA
# managed prefix list) complete the TLS handshake and get 200, while real
# Cloudflare traffic still presents and is verified. The ingress SG (Cloudflare +
# GA ranges only) is the compensating hard gate: no arbitrary certless client can
# reach 443. Populate origin-client-ca with Cloudflare's origin-pull CA.
apiVersion: traefik.io/v1alpha1
kind: TLSOption
metadata:
  name: default
spec:
  clientAuth:
    secretNames:
      - origin-client-ca
    clientAuthType: VerifyClientCertIfGiven
