# Traefik via Gateway API (Gateway + HTTPRoute) — ingress-nginx is retired.
# Traefik streams SSE natively (no proxy-buffering gotcha), so no annotation is
# needed to keep the event stream unbuffered.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: web
spec:
  gatewayClassName: traefik
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        # Cloudflare Authenticated Origin Pull (mTLS) is the real gate; the
        # origin cert + client-CA trust live in this secret (operator-populated).
        certificateRefs:
          - kind: Secret
            name: origin-tls
      allowedRoutes:
        namespaces:
          from: Same
---
# Application traffic. In Phase 14 the cross-region Traefik failover service
# attaches HERE (connection-failure only). SSE flows through natively.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: backend
spec:
  parentRefs:
    - name: web
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: backend
          port: 8080
---
# GA health check target: /healthz-local → LOCAL Spring readiness only. The
# fallback route is deliberately excluded so a region serving via cross-region
# fallback looks unhealthy and GA routes clients direct (requirements: Entry plane).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: healthz-local
spec:
  parentRefs:
    - name: web
  rules:
    - matches:
        - path:
            type: Exact
            value: /healthz-local
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /actuator/health/readiness
      backendRefs:
        - name: backend
          port: 8080
