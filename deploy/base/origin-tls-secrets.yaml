# Origin TLS material for the Traefik Gateway (traefik-gateway.yaml), sourced from
# AWS Secrets Manager via the existing aws-secrets-manager SecretStore — the same
# ESO pattern as the JWT keys, so a cluster rebuild re-creates these instead of a
# manual `kubectl create secret`. Without origin-tls the HTTPS listener is
# InvalidCertificateRef and EVERY route 404s (no cert → listener not Programmed).
#
# origin-tls — the server cert Traefik presents on 443 (a Cloudflare Origin
# Certificate in prod). MUST be a kubernetes.io/tls typed Secret (the Gateway
# certificateRef requires it), so a template sets the type and maps tls.crt/tls.key
# from the JSON fields of the Secrets Manager entry.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: origin-tls
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: origin-tls
    creationPolicy: Owner
    template:
      type: kubernetes.io/tls
      data:
        tls.crt: "{{ .tls_crt }}"
        tls.key: "{{ .tls_key }}"
  data:
    - secretKey: tls_crt
      remoteRef:
        key: danteplanner/origin-tls
        property: tls_crt
    - secretKey: tls_key
      remoteRef:
        key: danteplanner/origin-tls
        property: tls_key
# origin-client-ca (the Cloudflare origin-pull CA for mTLS) is DEFERRED with the
# TLSOption that consumed it — see traefik-gateway.yaml. Re-add this ExternalSecret
# when the traefik.io CRDs are installed and the TLSOption returns.
