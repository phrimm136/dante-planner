# Grafana Cloud remote_write credentials (stack id + access-policy token with
# metrics:write) sourced from AWS Secrets Manager via the existing
# `aws-secrets-manager` SecretStore (external-secret.yaml). Mounted as files by
# the prometheus Deployment — the stack id is account-identifying and this repo
# is public, so neither value may appear in the ConfigMap or any manifest.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-remote-write
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: grafana-remote-write
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: danteplanner/grafana/remote-write-username
    - secretKey: password
      remoteRef:
        key: danteplanner/grafana/remote-write-password
