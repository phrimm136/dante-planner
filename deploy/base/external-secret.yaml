# External Secrets Operator sources the RS256 JWT private key from AWS Secrets
# Manager. No IRSA without EKS: the SecretStore omits an explicit `auth` block,
# so the AWS SDK default chain falls back to the NODE INSTANCE PROFILE. This is
# coarser than IRSA — any pod on the ESO controller's node inherits the grant.
# Documented deviation (deploy README / terraform/oregon README).
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-west-2
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: jwt-rs256-private-key
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: jwt-rs256-private-key
    creationPolicy: Owner
  data:
    - secretKey: private_key.pem
      remoteRef:
        key: danteplanner/jwt/rs256-private-key
