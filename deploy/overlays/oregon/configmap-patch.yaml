apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
data:
  DEPLOY_REGION: us-west-2
  # In-cluster service DNS (region-invariant shape, region-local instances).
  REDIS_AUTH_HOST: redis-auth.danteplanner.svc.cluster.local
  REDIS_RATELIMIT_HOST: redis-ratelimit.danteplanner.svc.cluster.local
  # Auth read-local endpoint. Single-region Oregon: == REDIS_AUTH_HOST, so
  # blacklist/tombstone reads and writes share the one auth store (no-op split).
  # Seoul repoints this at the local replica. Must be set explicitly: the app's
  # ${AUTH_LOCAL_REDIS_HOST:${AUTH_REDIS_HOST:localhost}} default cannot see the
  # relaxed-bound REDIS_AUTH_HOST, so an unset value resolves to a dead localhost
  # and fail-opens every revocation check.
  REDIS_AUTHLOCAL_HOST: redis-auth.danteplanner.svc.cluster.local
  # DB connection (MYSQL_HOST/DATABASE/USER/PASSWORD) + SENTRY_DSN come from the
  # backend-runtime-config Secrets Manager bundle (runtime-config.yaml), not here —
  # environment-specific and secret values stay out of the committed overlay.
