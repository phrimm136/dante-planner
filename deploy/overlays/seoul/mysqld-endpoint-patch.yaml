apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysqld-exporter
spec:
  template:
    spec:
      containers:
        - name: mysqld-exporter
          env:
            # Must dial the name on the server certificate, not the Route53 alias.
            - name: MYSQLD_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: mysqld-exporter-dsn
                  key: replica-endpoint
