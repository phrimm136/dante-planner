# Seoul reads the LOCAL (ap-northeast-2) secret replicas, not Oregon's us-west-2
# originals — that is the whole point of terraform/secrets multi-region
# replication (chunk 2). Without this patch Seoul's ESO would pull cross-region
# from us-west-2, paying the latency and coupling Seoul's boot to Oregon.
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-northeast-2
