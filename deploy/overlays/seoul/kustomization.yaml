apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: danteplanner

resources:
- ../../base

# Same image contract as Oregon: CI bumps only newTag; the registry host (account
# id) is injected by the Seoul CP's ArgoCD Application at sync (rendered from
# terraform/seoul state), never committed. Seoul pulls the tag from its LOCAL
# replicated ECR (terraform/oregon ecr-replication.tf), not Oregon's registry.
images:
- name: danteplanner-backend
  newTag: c62f1083b8b0fef9a44fdc4637d1ce3d6d2ac448

patches:
- path: configmap-patch.yaml
- path: redis-replicaof-patch.yaml
- path: secretstore-region-patch.yaml
