# Shared location configs for HTTP and HTTPS servers

location /health {
    access_log off;
    return 200 "healthy\n";
    add_header Content-Type text/plain;
}

# SSE endpoints - special config for long-lived connections
# Matches: /api/sse/subscribe, /api/planner/{id}/comments/events, /api/planner/events
location ~ ^/api/(sse/subscribe|planner/[^/]+/events|planner/[^/]+/comments/events)$ {
    proxy_pass http://backend;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
    proxy_set_header X-Device-ID $http_x_device_id;
    proxy_set_header Connection '';

    # Critical for SSE
    proxy_buffering off;
    proxy_cache off;
    chunked_transfer_encoding off;
    proxy_set_header X-Accel-Buffering no;

    # Match backend SSE timeout (1 hour)
    proxy_connect_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_read_timeout 3600s;
}

location /api/ {
    proxy_pass http://backend;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
    proxy_set_header X-Device-ID $http_x_device_id;

    proxy_buffering off;
    proxy_cache_bypass $http_upgrade;

    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Graceful error handling during rolling update
    proxy_intercept_errors on;
    error_page 502 503 504 = @maintenance;
}

# Maintenance response when backend is unavailable
location @maintenance {
    default_type application/json;
    return 503 '{"code":"SERVICE_UPDATING","message":"Server is updating. Please retry in a few seconds."}';
}

location / {
    try_files $uri $uri/ /index.html;
}

location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
}
