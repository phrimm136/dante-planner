# Shared location configs for HTTP and HTTPS servers

# Deploy flag: deploy script touches /tmp/maintenance-flag before backend restart,
# removes it after backend is healthy (or after timeout). This distinguishes
# planned deploys from unexpected crashes.
set $error_body '{"code":"BACKEND_UNAVAILABLE","message":"Server is temporarily unavailable."}';
if (-f /tmp/maintenance-flag) {
    set $error_body '{"code":"SERVICE_UPDATING","message":"Server is updating. Please retry in a few seconds."}';
}

location /health {
    access_log off;
    return 200 "healthy\n";
    add_header Content-Type text/plain;
}

# SSE endpoints - special config for long-lived connections
# Matches: /api/sse/subscribe, /api/planner/{id}/comments/events, /api/planner/events
location ~ ^/api/(sse/subscribe|planner/[^/]+/events|planner/[^/]+/comments/events)$ {
    proxy_pass http://backend;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
    proxy_set_header X-Device-ID $http_x_device_id;
    proxy_set_header Connection '';

    # Critical for SSE
    proxy_buffering off;
    proxy_cache off;
    chunked_transfer_encoding off;
    proxy_set_header X-Accel-Buffering no;

    proxy_connect_timeout 5s;
    # Match backend SSE timeout (1 hour)
    proxy_send_timeout 3600s;
    proxy_read_timeout 3600s;
}

# Internal API - blocked from external access (use docker exec to reach backend directly)
location /api/internal/ {
    return 404;
}

location /api/ {
    # CORS preflight — handled by nginx so it works even when backend is down
    if ($request_method = 'OPTIONS') {
        add_header Access-Control-Allow-Origin $http_origin;
        add_header Access-Control-Allow-Methods 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
        add_header Access-Control-Allow-Headers 'Content-Type, Cache-Control';
        add_header Access-Control-Allow-Credentials true;
        add_header Access-Control-Max-Age 3600;
        return 204;
    }

    proxy_pass http://backend;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
    proxy_set_header X-Device-ID $http_x_device_id;

    proxy_buffering off;
    proxy_cache_bypass $http_upgrade;

    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Graceful error handling during backend downtime
    proxy_intercept_errors on;
    error_page 502 503 504 = @backend_error;
}

# Backend error response - content varies based on maintenance flag
# Full CORS headers required because Spring's CorsFilter is bypassed when backend is down
location @backend_error {
    add_header Access-Control-Allow-Origin $http_origin always;
    add_header Access-Control-Allow-Methods 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
    add_header Access-Control-Allow-Headers 'Content-Type, Cache-Control' always;
    add_header Access-Control-Allow-Credentials true always;
    default_type application/json;
    return 503 $error_body;
}

location / {
    try_files $uri $uri/ /index.html;
}

location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
}
