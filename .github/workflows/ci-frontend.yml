name: CI Frontend

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/ci-frontend.yml'
  pull_request:
    branches: [main, staging, dev]
    paths:
      - 'frontend/**'
      - '.github/workflows/ci-frontend.yml'

jobs:
  check-origin:
    permissions: {}
    uses: ./.github/workflows/check-pr-origin.yml

  checkout:
    permissions:
      contents: read
    needs: check-origin
    if: >-
      needs.check-origin.outputs.is-internal == 'true' ||
      github.base_ref == 'dev'
    uses: ./.github/workflows/checkout-submodules.yml
    secrets:
      STATIC_DEPLOY_KEY: ${{ secrets.STATIC_DEPLOY_KEY }}

  test-frontend:
    needs: checkout
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: repo-with-submodules
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: FE Test
        working-directory: ./frontend
        run: |
          yarn install --frozen-lockfile
          yarn test

      - name: FE Lint
        working-directory: ./frontend
        run: yarn lint

      - name: FE Format Check
        working-directory: ./frontend
        run: yarn fmt:check

  build-frontend:
    needs: [checkout, test-frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: repo-with-submodules
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: FE Build
        timeout-minutes: 10
        working-directory: ./frontend
        run: |
          yarn install --frozen-lockfile
          yarn build
        env:
          NODE_OPTIONS: '--max-old-space-size=6144'

  notify-failure:
    needs: [checkout, test-frontend, build-frontend]
    if: failure() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      actions: read
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: .github/actions
      - uses: ./.github/actions/notify-ci-failure
        with:
          title: CI Failed — Frontend
          pr-number: ${{ github.event.pull_request.number }}
          jobs-json: |
            [
              {"name": "Checkout", "result": "${{ needs.checkout.result }}"},
              {"name": "Test", "result": "${{ needs.test-frontend.result }}"},
              {"name": "Build", "result": "${{ needs.build-frontend.result }}"}
            ]
