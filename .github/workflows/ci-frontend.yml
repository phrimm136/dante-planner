name: CI Frontend

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/ci-frontend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'

jobs:
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STATIC_DEPLOY_KEY }}
      - run: git submodule update --init
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: FE Test
        working-directory: ./frontend
        run: |
          yarn install --frozen-lockfile
          yarn test
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}

  build-frontend:
    needs: [test-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STATIC_DEPLOY_KEY }}
      - run: git submodule update --init
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: FE Build
        working-directory: ./frontend
        run: |
          yarn install --frozen-lockfile
          yarn build

  notify-failure:
    needs: [test-frontend, build-frontend]
    if: failure() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      actions: read
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: .github/actions
      - uses: ./.github/actions/notify-ci-failure
        with:
          title: CI Failed — Frontend
          pr-number: ${{ github.event.pull_request.number }}
          jobs-json: |
            [
              {"name": "Test", "result": "${{ needs.test-frontend.result }}"},
              {"name": "Build", "result": "${{ needs.build-frontend.result }}"}
            ]
