name: CI Backend

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/ci-backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: BE Test
        working-directory: ./backend
        run: ./gradlew test -q
  build-backend:
    needs: [test-backend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Mock Build Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: ci/danteplanner-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  notify-failure:
    needs: [test-backend, build-backend]
    if: failure() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      actions: read
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: .github/actions
      - uses: ./.github/actions/notify-ci-failure
        with:
          title: CI Failed — Backend
          pr-number: ${{ github.event.pull_request.number }}
          jobs-json: |
            [
              {"name": "Test", "result": "${{ needs.test-backend.result }}"},
              {"name": "Build", "result": "${{ needs.build-backend.result }}"}
            ]
