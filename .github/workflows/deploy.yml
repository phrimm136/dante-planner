name: Deploy to Production

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'nginx/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

env:
  DEPLOY_PATH: /opt/limbusplanner

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run backend tests
        working-directory: ./backend
        run: ./mvnw test -q

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: yarn install --frozen-lockfile

      - name: Run frontend tests
        working-directory: ./frontend
        env:
          VITE_GOOGLE_CLIENT_ID: test-client-id-for-ci
          VITE_API_BASE_URL: http://localhost:8080
        run: yarn test --run

  build:
    name: Build Docker Images
    # needs: test  # Temporarily disabled
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        working-directory: ./backend
        run: docker build -t danteplanner-backend:${{ github.sha }} .

      - name: Build nginx image
        working-directory: ./nginx
        run: docker build -t danteplanner-nginx:${{ github.sha }} .

  deploy:
    name: Deploy to EC2
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["cd /opt/danteplanner && chown -R ec2-user:ec2-user /opt/danteplanner && sudo -u ec2-user git fetch origin main && sudo -u ec2-user git reset --hard origin/main && /usr/local/bin/docker-compose pull mysql && DOCKER_BUILDKIT=0 /usr/local/bin/docker-compose build --no-cache backend nginx && /usr/local/bin/docker-compose up -d --force-recreate && echo Done"]' \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"

          # Wait for command to complete
          for i in {1..30}; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")

            echo "Status: $STATUS"

            if [ "$STATUS" = "Success" ]; then
              echo "Deployment successful"
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "Deployment failed"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                --query "StandardErrorContent" \
                --output text
              exit 1
            fi

            sleep 10
          done

          echo "Deployment timed out"
          exit 1

  health-check:
    name: Verify Deployment
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Check health endpoint
        run: |
          for i in 1 2 3; do
            response=$(curl -s -o /dev/null -w "%{http_code}" https://api.dante-planner.com/actuator/health || echo "000")
            if [ "$response" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i failed (HTTP $response), retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 3 attempts"
          exit 1

  rollback:
    name: Rollback on Failure
    needs: health-check
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Rollback via SSM
        run: |
          aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["cd /opt/danteplanner && chown -R ec2-user:ec2-user /opt/danteplanner && sudo -u ec2-user git reset --hard HEAD~1 && DOCKER_BUILDKIT=0 /usr/local/bin/docker-compose build --no-cache backend nginx && /usr/local/bin/docker-compose up -d --force-recreate && echo Rollback complete"]' \
            --output text
