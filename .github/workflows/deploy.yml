name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DEPLOY_PATH: /opt/limbusplanner

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run backend tests
        working-directory: ./backend
        run: ./mvnw test -q

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: yarn install --frozen-lockfile

      - name: Run frontend tests
        working-directory: ./frontend
        env:
          VITE_GOOGLE_CLIENT_ID: test-client-id-for-ci
          VITE_API_BASE_URL: http://localhost:8080
        run: yarn test --run

  build:
    name: Build Docker Images
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        working-directory: ./backend
        run: docker build -t danteplanner-backend:${{ github.sha }} .

      - name: Build nginx image
        working-directory: ./nginx
        run: docker build -t danteplanner-nginx:${{ github.sha }} .

  deploy:
    name: Deploy to EC2
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ${{ env.DEPLOY_PATH }}
            git fetch origin main
            git reset --hard origin/main
            docker-compose pull mysql
            docker-compose build --no-cache backend nginx
            docker-compose up -d --force-recreate
            echo "Waiting for services to start..."
            sleep 30

  health-check:
    name: Verify Deployment
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Check health endpoint
        run: |
          for i in 1 2 3; do
            response=$(curl -s -o /dev/null -w "%{http_code}" https://api.dante-planner.com/actuator/health || echo "000")
            if [ "$response" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i failed (HTTP $response), retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 3 attempts"
          exit 1

  rollback:
    name: Rollback on Failure
    needs: health-check
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Rollback via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ${{ env.DEPLOY_PATH }}
            echo "Rolling back to previous commit..."
            git reset --hard HEAD~1
            docker-compose build --no-cache backend nginx
            docker-compose up -d --force-recreate
            echo "Rollback complete"
