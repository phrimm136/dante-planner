name: Deploy to Production

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'nginx/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      setup_cloudwatch:
        description: 'Run CloudWatch alarms setup (one-time)'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  DEPLOY_PATH: /opt/danteplanner
  # AWS Account ID와 Region은 Secrets에서 가져와 ECR 주소 생성
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

jobs:
  # 1. 테스트 단계 (병렬 실행)
  test-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run backend tests
        working-directory: ./backend
        run: ./mvnw test -q

  test-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock
      - name: Install & Test
        working-directory: ./frontend
        env:
          VITE_GOOGLE_CLIENT_ID: test-client-id-for-ci
          VITE_API_BASE_URL: http://localhost:8080
        run: |
          yarn install --frozen-lockfile
          yarn test --run

  # 2. 빌드 및 ECR 전송 (GitHub Actions에서 수행)
  build-and-push:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.ECR_REGISTRY }}/danteplanner-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and Push Nginx
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          tags: ${{ env.ECR_REGISTRY }}/danteplanner-nginx:${{ github.sha }}
          cache-from: type=gha,scope=nginx
          cache-to: type=gha,mode=max,scope=nginx

  # 3. EC2 배포 (SSM을 통한 자동화)
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy via SSM
        run: |
          # 1. EC2에서 실행될 순수 쉘 스크립트 작성
          cat <<'EOF' > raw_script.sh
          cd /opt/danteplanner

          # Root 권한으로 Docker 및 Compose 설치 여부 확인 및 설치
          if ! command -v docker &> /dev/null; then
            echo "Installing Docker..."
            sudo yum update -y
            sudo yum install -y docker
            sudo systemctl start docker
            sudo systemctl enable docker
            sudo usermod -aG docker ec2-user
          fi

          # Docker Compose V2 플러그인 설치 확인
          if ! docker compose version &> /dev/null; then
            echo "Installing Docker Compose V2..."
            DOCKER_CONFIG=${DOCKER_CONFIG:-/usr/local/lib/docker/cli-plugins}
            sudo mkdir -p $DOCKER_CONFIG
            sudo curl -SL https://github.com/docker/compose/releases/download/v2.24.5/docker-compose-linux-x86_64 -o $DOCKER_CONFIG/docker-compose
            sudo chmod +x $DOCKER_CONFIG/docker-compose
          fi

          # EC2 유저 권한으로 나머지 작업 수행
          sudo -u ec2-user bash -e <<'INNER_BATCH'
          cd /opt/danteplanner
          
          # Git 설치 확인
          if ! command -v git &> /dev/null; then
            sudo yum install -y git
          fi

          # 소스 코드 업데이트
          if [ ! -d ".git" ]; then
            git clone https://github.com/${{ github.repository }}.git .
          else
            git fetch origin main
            git reset --hard origin/main
          fi

          # Save current IMAGE_TAG for rollback before updating
          if [ -f .env ]; then
            CURRENT_TAG=$(grep '^IMAGE_TAG=' .env | cut -d'=' -f2 | tr -d '"' | tr -d "'" || echo "")
            if [ -n "$CURRENT_TAG" ]; then
              echo "$CURRENT_TAG" > .previous_image_tag
              echo "Saved previous IMAGE_TAG: $CURRENT_TAG"
            fi
          fi

          # Fetch secrets from SSM Parameter Store (encrypted)
          MYSQL_PASSWORD=$(aws ssm get-parameter --name "MYSQL_PASSWORD" --with-decryption --query "Parameter.Value" --output text --region us-west-2)
          JWT_SECRET=$(aws ssm get-parameter --name "JWT_SECRET" --with-decryption --query "Parameter.Value" --output text --region us-west-2)
          SENTRY_DSN=$(aws ssm get-parameter --name "SENTRY_DSN" --with-decryption --query "Parameter.Value" --output text --region us-west-2)
          GOOGLE_CLIENT_SECRET=$(aws ssm get-parameter --name "GOOGLE_OAUTH_CLIENT_SECRET" --with-decryption --query "Parameter.Value" --output text --region us-west-2)

          # 환경 변수 파일 생성 (non-secrets from GitHub, secrets from SSM)
          cat <<ENV_EOF > .env
          IMAGE_TAG=${{ github.sha }}
          AWS_ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }}
          AWS_REGION=${{ secrets.AWS_REGION }}
          SPRING_PROFILES_ACTIVE=prod
          SSL_CERT_PATH=${{ secrets.SSL_CERT_PATH }}
          MYSQL_USER=${{ secrets.MYSQL_USER }}
          MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}
          MYSQL_PASSWORD=$MYSQL_PASSWORD
          GOOGLE_OAUTH_CLIENT_ID=${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET
          JWT_SECRET=$JWT_SECRET
          SENTRY_DSN=$SENTRY_DSN
          TRUSTED_PROXY_IPS=172.16.0.0/12
          CORS_ALLOWED_ORIGINS=https://dante-planner.com
          ENV_EOF

          # ECR 로그인
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
          docker compose pull

          # Rolling Update: nginx first (serves maintenance page), then backend
          # This minimizes downtime - nginx stays up to respond with 503 during backend restart
          docker compose up -d --no-deps --force-recreate nginx
          sleep 2  # Wait for nginx to be ready
          docker compose up -d --no-deps --force-recreate backend

          # Cleanup orphaned containers and old images
          docker compose up -d --remove-orphans
          docker image prune -f --filter "until=720h"  # 30 days

          # Setup cron jobs (idempotent)
          chmod +x scripts/aws-backup.sh scripts/update-cloudflare-ips.sh

          # Backup: 02:00 KST daily
          BACKUP_CRON="0 17 * * * /opt/danteplanner/scripts/aws-backup.sh >> /var/log/danteplanner-backup.log 2>&1"
          # Cloudflare IP update: 03:00 KST daily
          CF_IP_CRON="0 18 * * * /opt/danteplanner/scripts/update-cloudflare-ips.sh >> /var/log/cloudflare-ip-update.log 2>&1"

          (crontab -l 2>/dev/null | grep -v "aws-backup.sh" | grep -v "update-cloudflare-ips.sh"; echo "$BACKUP_CRON"; echo "$CF_IP_CRON") | crontab -

          # Setup aliases and welcome message in ec2-user's bashrc
          BASHRC_FILE="/home/ec2-user/.bashrc"

          # Remove old danteplanner block if exists
          sed -i '/# >>> danteplanner aliases >>>/,/# <<< danteplanner aliases <<</d' "$BASHRC_FILE" 2>/dev/null || true

          # Add new block using echo to avoid YAML heredoc issues
          {
            echo ''
            echo '# >>> danteplanner aliases >>>'
            echo "alias dp-logs='cd /opt/danteplanner && docker compose logs -f'"
            echo "alias dp-status='cd /opt/danteplanner && docker compose ps'"
            echo "alias dp-restart='cd /opt/danteplanner && docker compose restart'"
            echo "alias dp-backup='/opt/danteplanner/scripts/aws-backup.sh'"
            echo "alias dp-cfips='/opt/danteplanner/scripts/update-cloudflare-ips.sh'"
            echo "alias dp-deploy='cd /opt/danteplanner && git pull && docker compose pull && docker compose up -d'"
            echo ''
            echo '# Welcome message'
            echo 'echo ""'
            echo 'echo "=========================================="'
            echo 'echo "  DantePlanner EC2 Server"'
            echo 'echo "=========================================="'
            echo 'echo ""'
            echo 'echo "Available commands:"'
            echo 'echo "  dp-logs     - Follow container logs"'
            echo 'echo "  dp-status   - Show container status"'
            echo 'echo "  dp-restart  - Restart all containers"'
            echo 'echo "  dp-backup   - Run database backup to S3"'
            echo 'echo "  dp-cfips    - Update Cloudflare IP ranges"'
            echo 'echo "  dp-deploy   - Manual deploy (git pull + docker up)"'
            echo 'echo ""'
            echo 'echo "Logs:"'
            echo 'echo "  /var/log/danteplanner-backup.log"'
            echo 'echo "  /var/log/cloudflare-ip-update.log"'
            echo 'echo ""'
            echo '# <<< danteplanner aliases <<<'
          } >> "$BASHRC_FILE"
          INNER_BATCH
          EOF

          # 2. jq를 사용하여 안전한 JSON 생성 (파일로부터 읽기)
          jq -n --rawfile cmd raw_script.sh '{"commands": [$cmd]}' > ssm_params.json

          # 3. SSM 명령어 전송 (파일 참조 방식)
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters file://ssm_params.json \
            --query "Command.CommandId" --output text)

          echo "Command ID: $COMMAND_ID"

          # 4. 결과 대기
          aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "${{ secrets.EC2_INSTANCE_ID }}" || true
          
          # 5. 상세 결과 확인 및 로그 출력
          INVOCATION_RESULT=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}")
          
          STATUS=$(echo "$INVOCATION_RESULT" | jq -r '.Status')
          echo "Final Status: $STATUS"

          if [ "$STATUS" != "Success" ]; then
            echo "--- ERROR LOG ---"
            echo "$INVOCATION_RESULT" | jq -r '.StandardErrorContent'
            exit 1
          fi

  # 4. Health Check (SSM을 통해 localhost에서 확인)
  health-check:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      healthy: ${{ steps.check.outputs.healthy }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Health check via SSM
        id: check
        run: |
          INSTANCE_ID=$(echo "${{ secrets.EC2_INSTANCE_ID }}" | tr -d '"' | tr -d ' ')
          MAX_ATTEMPTS=5
          WAIT_TIME=5
          TOTAL_WAIT=0
          MAX_TOTAL_WAIT=120

          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "Health check attempt $attempt (waited ${TOTAL_WAIT}s so far)..."

            RAW_COMMAND_ID=$(aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --parameters 'commands=["curl -sf http://localhost/health && curl -sf http://localhost/actuator/health || exit 1"]' \
              --query "Command.CommandId" --output text)

            COMMAND_ID=$(echo $RAW_COMMAND_ID | tr -d '"' | tr -d ' ')

            aws ssm wait command-executed \
              --command-id $COMMAND_ID \
              --instance-id $INSTANCE_ID || true

            HEALTH_STATUS=$(aws ssm get-command-invocation \
              --command-id $COMMAND_ID \
              --instance-id $INSTANCE_ID \
              --query "Status" --output text)

            if [ "$HEALTH_STATUS" = "Success" ]; then
              echo "healthy=true" >> $GITHUB_OUTPUT
              echo "Health check passed on attempt $attempt"
              exit 0
            fi

            # Exponential backoff: 5s, 10s, 20s, 40s
            TOTAL_WAIT=$((TOTAL_WAIT + WAIT_TIME))
            if [ $TOTAL_WAIT -ge $MAX_TOTAL_WAIT ]; then
              echo "Exceeded max wait time of ${MAX_TOTAL_WAIT}s"
              break
            fi

            echo "Health check failed, waiting ${WAIT_TIME}s before retry..."
            sleep $WAIT_TIME
            WAIT_TIME=$((WAIT_TIME * 2))
          done

          echo "healthy=false" >> $GITHUB_OUTPUT
          echo "Health check failed after $MAX_ATTEMPTS attempts"
          exit 1

  # 5. Rollback (health-check 실패 시)
  rollback:
    needs: health-check
    if: failure()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Rollback via SSM
        run: |
          echo "Rolling back to previous version..."

          cat <<'EOF' > rollback_script.sh
          cd /opt/danteplanner
          sudo -u ec2-user bash -e <<'INNER_BATCH'
          cd /opt/danteplanner

          # Restore previous IMAGE_TAG if saved
          if [ -f .previous_image_tag ]; then
            PREV_TAG=$(cat .previous_image_tag)
            echo "Restoring previous IMAGE_TAG: $PREV_TAG"
            sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=$PREV_TAG/" .env
          else
            echo "WARNING: No previous image tag found, using git rollback only"
            git reset --hard HEAD~1
          fi

          # ECR login and restart with previous images
          aws ecr get-login-password --region $(grep AWS_REGION .env | cut -d'=' -f2) | \
            docker login --username AWS --password-stdin \
            $(grep AWS_ACCOUNT_ID .env | cut -d'=' -f2).dkr.ecr.$(grep AWS_REGION .env | cut -d'=' -f2).amazonaws.com

          docker compose pull
          docker compose down --remove-orphans
          docker compose up -d --force-recreate
          INNER_BATCH
          EOF

          jq -n --rawfile cmd rollback_script.sh '{"commands": [$cmd]}' > rollback_params.json

          RAW_COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters file://rollback_params.json \
            --query "Command.CommandId" --output text)

          COMMAND_ID=$(echo $RAW_COMMAND_ID | tr -d '"' | tr -d ' ')
          INSTANCE_ID=$(echo "${{ secrets.EC2_INSTANCE_ID }}" | tr -d '"' | tr -d ' ')

          aws ssm wait command-executed \
            --command-id $COMMAND_ID \
            --instance-id $INSTANCE_ID

          ROLLBACK_STATUS=$(aws ssm get-command-invocation \
            --command-id $COMMAND_ID \
            --instance-id $INSTANCE_ID \
            --query "Status" --output text)

          if [ "$ROLLBACK_STATUS" = "Success" ]; then
            echo "Rollback completed successfully"
          else
            echo "Rollback failed - manual intervention required"
            exit 1
          fi

  # 6. CloudWatch Setup (one-time, manual trigger only)
  setup-cloudwatch:
    needs: health-check
    if: ${{ github.event.inputs.setup_cloudwatch == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup CloudWatch alarms via SSM
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
        run: |
          echo "Setting up CloudWatch alarms and S3 logging..."

          cat <<'EOF' > cloudwatch_script.sh
          cd /opt/danteplanner
          sudo -u ec2-user bash -e <<'INNER_BATCH'
          cd /opt/danteplanner

          # Export environment for the script
          export AWS_REGION="__AWS_REGION__"
          export EC2_INSTANCE_ID="__INSTANCE_ID__"
          export ALERT_EMAIL="__ALERT_EMAIL__"
          export S3_BACKUP_BUCKET="danteplanner-backups"
          export S3_LOGS_BUCKET="danteplanner-logs"

          # Run the setup script
          chmod +x scripts/setup-cloudwatch-alarms.sh
          ./scripts/setup-cloudwatch-alarms.sh
          INNER_BATCH
          EOF

          # Replace placeholders with actual values
          sed -i "s|__AWS_REGION__|$AWS_REGION|g" cloudwatch_script.sh
          sed -i "s|__INSTANCE_ID__|$INSTANCE_ID|g" cloudwatch_script.sh
          sed -i "s|__ALERT_EMAIL__|$ALERT_EMAIL|g" cloudwatch_script.sh

          jq -n --rawfile cmd cloudwatch_script.sh '{"commands": [$cmd]}' > cloudwatch_params.json

          RAW_COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters file://cloudwatch_params.json \
            --query "Command.CommandId" --output text)

          COMMAND_ID=$(echo $RAW_COMMAND_ID | tr -d '"' | tr -d ' ')
          CLEAN_INSTANCE_ID=$(echo "$INSTANCE_ID" | tr -d '"' | tr -d ' ')

          echo "Command ID: $COMMAND_ID"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$CLEAN_INSTANCE_ID" || true

          RESULT=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$CLEAN_INSTANCE_ID")

          STATUS=$(echo "$RESULT" | jq -r '.Status')
          echo "Status: $STATUS"

          # Always show stdout
          echo "--- STDOUT ---"
          echo "$RESULT" | jq -r '.StandardOutputContent'

          if [ "$STATUS" != "Success" ]; then
            echo "--- STDERR ---"
            echo "$RESULT" | jq -r '.StandardErrorContent'
            exit 1
          fi

          echo ""
          echo "CloudWatch setup completed successfully"
