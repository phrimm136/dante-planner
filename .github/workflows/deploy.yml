name: Deploy to Production

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'nginx/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  DEPLOY_PATH: /opt/danteplanner
  # AWS Account ID와 Region은 Secrets에서 가져와 ECR 주소 생성
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

jobs:
  # 1. 테스트 단계 (병렬 실행)
  test-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run backend tests
        working-directory: ./backend
        run: ./mvnw test -q

  test-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock
      - name: Install & Test
        working-directory: ./frontend
        env:
          VITE_GOOGLE_CLIENT_ID: test-client-id-for-ci
          VITE_API_BASE_URL: http://localhost:8080
        run: |
          yarn install --frozen-lockfile
          yarn test --run

  # 2. 빌드 및 ECR 전송 (GitHub Actions에서 수행)
  build-and-push:
    #needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build Backend JAR
        run: |
          cd backend
          chmod +x mvnw
          ./mvnw clean package -DskipTests -B
          # Verify the file exists and show it in logs for logging
          echo "Checking JAR location:"
          ls -lh ./target/*.jar

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend        # Ensure this is the directory containing 'target'
          file: ./backend/Dockerfile.prod
          push: true
          tags: ${{ env.ECR_REGISTRY }}/danteplanner-backend:${{ github.sha }}
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            JAR_FILE=target/*.jar

      - name: Build and Push Nginx
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          tags: ${{ env.ECR_REGISTRY }}/danteplanner-nginx:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 3. EC2 배포 (SSM을 통한 자동화)
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy via SSM
        run: |
          # 1. SSM 명령어 전송 및 ID 추출 (따옴표 제거 로직 추가)
          RAW_COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["
              # [System Setup]
              dnf install -y docker docker-compose-plugin git
              systemctl enable --now docker

              mkdir -p ${{ env.DEPLOY_PATH }}
              chown ec2-user:ec2-user ${{ env.DEPLOY_PATH }}

              # [ECR Login]
              aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}
              
              # [User Context Execution]
              sudo -u ec2-user bash -c '"'"'
                cd ${{ env.DEPLOY_PATH }}
                if [ ! -d \".git\" ]; then
                  git clone https://github.com/${{ github.repository }}.git .
                else
                  git fetch origin main
                  git reset --hard origin/main
                fi

                # Persist env vars to .env (docker-compose reads automatically)
                echo 'IMAGE_TAG=${{ github.sha }}' > .env
                echo 'AWS_ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }}' >> .env
                echo 'AWS_REGION=${{ secrets.AWS_REGION }}' >> .env
                echo 'SPRING_PROFILES_ACTIVE=prod' >> .env
                echo 'SSL_CERT_PATH=${{ secrets.SSL_CERT_PATH }}' >> .env

                docker compose pull
                docker compose up -d --force-recreate
                docker image prune -f
              '"'"'
            "]' \
            --query "Command.CommandId" --output text)

          # 2. 데이터 정제: 혹시 모를 큰따옴표나 공백을 완전히 제거
          COMMAND_ID=$(echo $RAW_COMMAND_ID | tr -d '"' | tr -d ' ')
          INSTANCE_ID=$(echo "${{ secrets.EC2_INSTANCE_ID }}" | tr -d '"' | tr -d ' ')

          echo "Cleaned Command ID: $COMMAND_ID"
          echo "Cleaned Instance ID: $INSTANCE_ID"
          
          # 3. AWS CLI 내장 대기 명령 (정제된 변수 사용, 역슬래시 제거)
          aws ssm wait command-executed \
            --command-id $COMMAND_ID \
            --instance-id $INSTANCE_ID
          
          # 4. 최종 결과 확인
          FINAL_STATUS=$(aws ssm get-command-invocation \
            --command-id $COMMAND_ID \
            --instance-id $INSTANCE_ID \
            --query "Status" --output text)
          
          if [ "$FINAL_STATUS" != "Success" ]; then
            echo "Deployment Failed with status: $FINAL_STATUS"
            exit 1
          fi

  # 4. Health Check (SSM을 통해 localhost에서 확인)
  health-check:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      healthy: ${{ steps.check.outputs.healthy }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Health check via SSM
        id: check
        run: |
          # Wait for containers to stabilize
          sleep 30

          RAW_COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["curl -sf http://localhost/health && curl -sf http://localhost/actuator/health || exit 1"]' \
            --query "Command.CommandId" --output text)

          COMMAND_ID=$(echo $RAW_COMMAND_ID | tr -d '"' | tr -d ' ')
          INSTANCE_ID=$(echo "${{ secrets.EC2_INSTANCE_ID }}" | tr -d '"' | tr -d ' ')

          aws ssm wait command-executed \
            --command-id $COMMAND_ID \
            --instance-id $INSTANCE_ID || true

          HEALTH_STATUS=$(aws ssm get-command-invocation \
            --command-id $COMMAND_ID \
            --instance-id $INSTANCE_ID \
            --query "Status" --output text)

          if [ "$HEALTH_STATUS" = "Success" ]; then
            echo "healthy=true" >> $GITHUB_OUTPUT
            echo "Health check passed"
          else
            echo "healthy=false" >> $GITHUB_OUTPUT
            echo "Health check failed"
            exit 1
          fi

  # 5. Rollback (health-check 실패 시)
  rollback:
    needs: health-check
    if: failure()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Rollback via SSM
        run: |
          echo "Rolling back to previous version..."

          RAW_COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["
              cd ${{ env.DEPLOY_PATH }}

              # Rollback to previous commit
              sudo -u ec2-user bash -c '"'"'
                cd ${{ env.DEPLOY_PATH }}
                git reset --hard HEAD~1

                # Re-export env vars and restart with previous config
                export SPRING_PROFILES_ACTIVE=prod
                docker compose down
                docker compose up -d
              '"'"'
            "]' \
            --query "Command.CommandId" --output text)

          COMMAND_ID=$(echo $RAW_COMMAND_ID | tr -d '"' | tr -d ' ')
          INSTANCE_ID=$(echo "${{ secrets.EC2_INSTANCE_ID }}" | tr -d '"' | tr -d ' ')

          aws ssm wait command-executed \
            --command-id $COMMAND_ID \
            --instance-id $INSTANCE_ID

          ROLLBACK_STATUS=$(aws ssm get-command-invocation \
            --command-id $COMMAND_ID \
            --instance-id $INSTANCE_ID \
            --query "Status" --output text)

          if [ "$ROLLBACK_STATUS" = "Success" ]; then
            echo "Rollback completed successfully"
          else
            echo "Rollback failed - manual intervention required"
            exit 1
          fi
