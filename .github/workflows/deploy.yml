name: Deploy to Production

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'nginx/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

env:
  DEPLOY_PATH: /opt/danteplanner
  # AWS Account ID와 Region은 Secrets에서 가져와 ECR 주소 생성
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

jobs:
  # 1. 테스트 단계 (병렬 실행)
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run backend tests
        working-directory: ./backend
        run: ./mvnw test -q

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock
      - name: Install & Test
        working-directory: ./frontend
        env:
          VITE_GOOGLE_CLIENT_ID: test-client-id-for-ci
          VITE_API_BASE_URL: http://localhost:8080
        run: |
          yarn install --frozen-lockfile
          yarn test --run

  # 2. 빌드 및 ECR 전송 (GitHub Actions에서 수행)
  build-and-push:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.ECR_REGISTRY }}/danteplanner-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Nginx
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          tags: ${{ env.ECR_REGISTRY }}/danteplanner-nginx:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 3. EC2 배포 (SSM을 통한 자동화)
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy via SSM
        run: |
          # 1. SSM 명령어 전송 및 ID 추출 (따옴표 제거 로직 추가)
          RAW_COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["
              # [System Setup]
              dnf install -y docker docker-compose-plugin git
              systemctl start docker
              systemctl enable docker

              mkdir -p ${{ env.DEPLOY_PATH }}
              chown ec2-user:ec2-user ${{ env.DEPLOY_PATH }}

              # [ECR Login]
              aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}
              
              # [User Context Execution]
              sudo -u ec2-user bash -c '"'"'
                cd ${{ env.DEPLOY_PATH }}
                if [ ! -d \".git\" ]; then
                  git clone https://github.com/${{ github.repository }}.git .
                else
                  git fetch origin main
                  git reset --hard origin/main
                fi

                export IMAGE_TAG=${{ github.sha }}
                export AWS_ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }}
                export AWS_REGION=${{ secrets.AWS_REGION }}
                export SPRING_PROFILES_ACTIVE=prod
                
                docker compose pull
                docker compose up -d --force-recreate
                docker image prune -f
              '"'"'
            "]' \
            --query "Command.CommandId" --output text)

          # 2. 데이터 정제: 혹시 모를 큰따옴표나 공백을 완전히 제거
          COMMAND_ID=$(echo $RAW_COMMAND_ID | tr -d '"' | tr -d ' ')
          INSTANCE_ID=$(echo "${{ secrets.EC2_INSTANCE_ID }}" | tr -d '"' | tr -d ' ')

          echo "Cleaned Command ID: $COMMAND_ID"
          echo "Cleaned Instance ID: $INSTANCE_ID"
          
          # 3. AWS CLI 내장 대기 명령 (정제된 변수 사용, 역슬래시 제거)
          aws ssm wait command-executed \
            --command-id $COMMAND_ID \
            --instance-id $INSTANCE_ID
          
          # 4. 최종 결과 확인
          FINAL_STATUS=$(aws ssm get-command-invocation \
            --command-id $COMMAND_ID \
            --instance-id $INSTANCE_ID \
            --query "Status" --output text)
          
          if [ "$FINAL_STATUS" != "Success" ]; then
            echo "Deployment Failed with status: $FINAL_STATUS"
            exit 1
          fi
