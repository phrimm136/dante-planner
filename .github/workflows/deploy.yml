name: Deploy to Production

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'nginx/**'
      - 'mysql/**'
      - 'docker-compose.yml'
      - 'scripts/deploy/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  DEPLOY_PATH: /opt/danteplanner
  # AWS Account ID와 Region은 Secrets에서 가져와 ECR 주소 생성
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

jobs:
  # 0. Detect which services changed
  detect-changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      nginx: ${{ steps.filter.outputs.nginx }}
      mysql: ${{ steps.filter.outputs.mysql }}
      services: ${{ steps.filter.outputs.services }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Detect changed services
        id: filter
        run: |
          BACKEND_CHANGED=false
          NGINX_CHANGED=false
          MYSQL_CHANGED=false

          # workflow_dispatch = full deploy of all services
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            BACKEND_CHANGED=true
            NGINX_CHANGED=true
            MYSQL_CHANGED=true
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD)
            echo "Changed files:"
            echo "$CHANGED"

            echo "$CHANGED" | grep -q '^backend/'         && BACKEND_CHANGED=true || true
            echo "$CHANGED" | grep -q '^nginx/'           && NGINX_CHANGED=true   || true
            echo "$CHANGED" | grep -q '^mysql/'           && MYSQL_CHANGED=true   || true

            # Shared infra changes affect all services
            if echo "$CHANGED" | grep -qE '^(docker-compose\.yml|\.github/workflows/deploy\.yml|scripts/deploy/)'; then
              BACKEND_CHANGED=true
              NGINX_CHANGED=true
              MYSQL_CHANGED=true
            fi
          fi

          # Build comma-separated services list from flags
          SERVICES=""
          [ "$BACKEND_CHANGED" = "true" ] && SERVICES="${SERVICES:+$SERVICES,}backend"
          [ "$NGINX_CHANGED" = "true" ]   && SERVICES="${SERVICES:+$SERVICES,}nginx"
          [ "$MYSQL_CHANGED" = "true" ]   && SERVICES="${SERVICES:+$SERVICES,}mysql"

          echo "backend=$BACKEND_CHANGED" >> "$GITHUB_OUTPUT"
          echo "nginx=$NGINX_CHANGED"     >> "$GITHUB_OUTPUT"
          echo "mysql=$MYSQL_CHANGED"     >> "$GITHUB_OUTPUT"
          echo "services=$SERVICES"       >> "$GITHUB_OUTPUT"
          echo "Changed services: ${SERVICES:-none}"

  # 1. 빌드 및 ECR 전송 (GitHub Actions에서 수행)
  build-and-push:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.nginx == 'true' || needs.detect-changes.outputs.mysql == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Backend
        if: needs.detect-changes.outputs.backend == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.ECR_REGISTRY }}/danteplanner-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and Push Nginx
        if: needs.detect-changes.outputs.nginx == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./nginx
          push: true
          tags: ${{ env.ECR_REGISTRY }}/danteplanner-nginx:${{ github.sha }}
          cache-from: type=gha,scope=nginx
          cache-to: type=gha,mode=max,scope=nginx

      - name: Build and Push MySQL
        if: needs.detect-changes.outputs.mysql == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./mysql
          push: true
          tags: ${{ env.ECR_REGISTRY }}/danteplanner-mysql:${{ github.sha }}
          cache-from: type=gha,scope=mysql
          cache-to: type=gha,mode=max,scope=mysql

  # 2. EC2 배포 (SSM을 통한 자동화)
  deploy:
    needs: [detect-changes, build-and-push]
    if: always() && !cancelled() && needs.detect-changes.result == 'success' && (needs.build-and-push.result == 'success' || needs.build-and-push.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy via SSM
        env:
          IMAGE_TAG: ${{ github.sha }}
          CHANGED_SERVICES: ${{ needs.detect-changes.outputs.services }}
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          SSL_CERT_PATH: ${{ secrets.SSL_CERT_PATH }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GITHUB_REPO: ${{ github.repository }}
          EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          cat <<'EOF' > raw_script.sh
          cd /opt/danteplanner

          # Bootstrap: install git if needed (root), then update source as ec2-user
          command -v git &> /dev/null || yum install -y git
          chown -R ec2-user:ec2-user /opt/danteplanner
          if [ ! -d "/opt/danteplanner/.git" ]; then
            sudo -u ec2-user git init
            sudo -u ec2-user git remote add origin git@github.com:__GITHUB_REPO__.git
          else
            sudo -u ec2-user git config --remove-section url."https://x-access-token" 2>/dev/null || true
            sudo -u ec2-user git remote set-url origin git@github.com:__GITHUB_REPO__.git
          fi
          sudo -u ec2-user git fetch origin main
          sudo -u ec2-user git reset --hard origin/main
          sudo -u ec2-user git submodule update --init

          # Write deploy config (GitHub secrets -> temp file for scripts)
          cat > /tmp/deploy-config.env <<CONFIG
          IMAGE_TAG=__IMAGE_TAG__
          AWS_ACCOUNT_ID=__AWS_ACCOUNT_ID__
          AWS_REGION=__AWS_REGION__
          SSL_CERT_PATH=__SSL_CERT_PATH__
          MYSQL_USER=__MYSQL_USER__
          MYSQL_DATABASE=__MYSQL_DATABASE__
          GOOGLE_OAUTH_CLIENT_ID=__GOOGLE_OAUTH_CLIENT_ID__
          GITHUB_REPOSITORY=__GITHUB_REPO__
          CONFIG

          DEPLOY_ERRORS=""

          # Critical steps - fail fast
          sudo bash scripts/deploy/install-prerequisites.sh || { echo "[FATAL] Prerequisites failed at exit $?"; exit 1; }
          sudo -u ec2-user bash scripts/deploy/setup-env.sh || { echo "[FATAL] Environment setup failed at exit $?"; exit 1; }
          sudo -u ec2-user bash scripts/deploy/deploy-containers.sh "__CHANGED_SERVICES__" || { echo "[FATAL] Container deploy failed at exit $?"; exit 1; }

          # Non-critical steps - collect errors, continue
          sudo -u ec2-user bash scripts/deploy/setup-cron.sh || DEPLOY_ERRORS="${DEPLOY_ERRORS}cron: exit $?\n"
          sudo -u ec2-user bash scripts/deploy/setup-shell.sh || DEPLOY_ERRORS="${DEPLOY_ERRORS}shell: exit $?\n"

          rm -f /tmp/deploy-config.env

          if [ -n "$DEPLOY_ERRORS" ]; then
            echo "[WARN] Non-critical failures:"
            echo -e "$DEPLOY_ERRORS"
          fi
          EOF

          # Replace placeholders with actual values from env vars
          sed -i "s|__IMAGE_TAG__|$IMAGE_TAG|g" raw_script.sh
          sed -i "s|__AWS_ACCOUNT_ID__|$AWS_ACCOUNT_ID|g" raw_script.sh
          sed -i "s|__AWS_REGION__|$AWS_REGION|g" raw_script.sh
          sed -i "s|__SSL_CERT_PATH__|$SSL_CERT_PATH|g" raw_script.sh
          sed -i "s|__MYSQL_USER__|$MYSQL_USER|g" raw_script.sh
          sed -i "s|__MYSQL_DATABASE__|$MYSQL_DATABASE|g" raw_script.sh
          sed -i "s|__GOOGLE_OAUTH_CLIENT_ID__|$GOOGLE_OAUTH_CLIENT_ID|g" raw_script.sh
          sed -i "s|__GITHUB_REPO__|$GITHUB_REPO|g" raw_script.sh
          sed -i "s|__CHANGED_SERVICES__|$CHANGED_SERVICES|g" raw_script.sh

          jq -n --rawfile cmd raw_script.sh '{"commands": [$cmd]}' > ssm_params.json

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters file://ssm_params.json \
            --query "Command.CommandId" --output text)

          echo "Command ID: $COMMAND_ID"

          aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "$EC2_INSTANCE_ID" || true

          INVOCATION_RESULT=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID")

          STATUS=$(echo "$INVOCATION_RESULT" | jq -r '.Status')
          echo "Final Status: $STATUS"

          echo "--- STDOUT ---"
          echo "$INVOCATION_RESULT" | jq -r '.StandardOutputContent'

          if [ "$STATUS" != "Success" ]; then
            echo "--- ERROR LOG ---"
            echo "$INVOCATION_RESULT" | jq -r '.StandardErrorContent'
            exit 1
          fi

  # 3. Health Check (SSM을 통해 localhost에서 확인)
  health-check:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      healthy: ${{ steps.check.outputs.healthy }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Health check via SSM
        id: check
        env:
          EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["cd /opt/danteplanner && sudo -u ec2-user bash scripts/deploy/health-check.sh"]' \
            --query "Command.CommandId" --output text)

          echo "Command ID: $COMMAND_ID"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" || true

          INVOCATION_RESULT=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID")

          STATUS=$(echo "$INVOCATION_RESULT" | jq -r '.Status')
          echo "--- STDOUT ---"
          echo "$INVOCATION_RESULT" | jq -r '.StandardOutputContent'

          if [ "$STATUS" = "Success" ]; then
            echo "healthy=true" >> $GITHUB_OUTPUT
          else
            echo "healthy=false" >> $GITHUB_OUTPUT
            echo "--- ERROR LOG ---"
            echo "$INVOCATION_RESULT" | jq -r '.StandardErrorContent'
            exit 1
          fi

  # 4. Rollback (health-check 실패 시)
  rollback:
    needs: health-check
    if: failure()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Rollback via SSM
        env:
          EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          echo "Rolling back to previous version..."

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["cd /opt/danteplanner && sudo -u ec2-user bash scripts/deploy/rollback.sh"]' \
            --query "Command.CommandId" --output text)

          echo "Command ID: $COMMAND_ID"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" || true

          INVOCATION_RESULT=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID")

          STATUS=$(echo "$INVOCATION_RESULT" | jq -r '.Status')
          echo "--- STDOUT ---"
          echo "$INVOCATION_RESULT" | jq -r '.StandardOutputContent'

          if [ "$STATUS" = "Success" ]; then
            echo "Rollback completed successfully"
          else
            echo "--- ERROR LOG ---"
            echo "$INVOCATION_RESULT" | jq -r '.StandardErrorContent'
            echo "Rollback failed - manual intervention required"
            exit 1
          fi

  # 5. Notify PR on failure
  notify-failure:
    needs: [detect-changes, build-and-push, deploy, health-check]
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      actions: read
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: .github/actions
      - uses: ./.github/actions/notify-ci-failure
        with:
          title: Deploy Failed
          jobs-json: |
            [
              {"name": "Detect Changes", "result": "${{ needs.detect-changes.result }}"},
              {"name": "Build & Push", "result": "${{ needs.build-and-push.result }}"},
              {"name": "Deploy", "result": "${{ needs.deploy.result }}"},
              {"name": "Health Check", "result": "${{ needs.health-check.result }}"}
            ]
