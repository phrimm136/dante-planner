name: Deploy to Production

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'nginx/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  DEPLOY_PATH: /opt/danteplanner
  # AWS Account ID와 Region은 Secrets에서 가져와 ECR 주소 생성
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

jobs:
  # 1. 테스트 단계 (병렬 실행)
  test-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run backend tests
        working-directory: ./backend
        run: ./mvnw test -q

  test-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock
      - name: Install & Test
        working-directory: ./frontend
        env:
          VITE_GOOGLE_CLIENT_ID: test-client-id-for-ci
          VITE_API_BASE_URL: http://localhost:8080
        run: |
          yarn install --frozen-lockfile
          yarn test --run

  # 2. 빌드 및 ECR 전송 (GitHub Actions에서 수행)
  build-and-push:
    #needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend        # Ensure this is the directory containing 'target'
          file: ./backend/Dockerfile.prod
          push: true
          tags: ${{ env.ECR_REGISTRY }}/danteplanner-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Nginx
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          tags: ${{ env.ECR_REGISTRY }}/danteplanner-nginx:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 3. EC2 배포 (SSM을 통한 자동화)
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy via SSM
        run: |
          # 1. EC2에서 실행될 순수 쉘 스크립트 작성
          cat <<'EOF' > raw_script.sh
          cd /opt/danteplanner
          sudo -u ec2-user bash -e <<'INNER_BATCH'
          # Root 권한으로 Docker 및 Compose 설치 여부 확인 및 설치
          if ! command -v docker &> /dev/null; then
            echo "Installing Docker..."
            sudo yum update -y
            sudo yum install -y docker
            sudo systemctl start docker
            sudo systemctl enable docker
            sudo usermod -aG docker ec2-user
          fi

          # Docker Compose V2 플러그인 설치 확인
          if ! docker compose version &> /dev/null; then
            echo "Installing Docker Compose V2..."
            DOCKER_CONFIG=${DOCKER_CONFIG:-/usr/local/lib/docker/cli-plugins}
            sudo mkdir -p $DOCKER_CONFIG
            sudo curl -SL https://github.com/docker/compose/releases/download/v2.24.5/docker-compose-linux-x86_64 -o $DOCKER_CONFIG/docker-compose
            sudo chmod +x $DOCKER_CONFIG/docker-compose
          fi

          # EC2 유저 권한으로 나머지 작업 수행
          sudo -u ec2-user bash -e <<'INNER_BATCH'
          cd /opt/danteplanner
          
          # Git 설치 확인
          if ! command -v git &> /dev/null; then
            sudo yum install -y git
          fi

          # 소스 코드 업데이트
          if [ ! -d ".git" ]; then
            git clone https://github.com/${{ github.repository }}.git .
          else
            git fetch origin main
            git reset --hard origin/main
          fi

          # 환경 변수 파일 생성
          cat <<'ENV_EOF' > .env
          IMAGE_TAG=${{ github.sha }}
          AWS_ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }}
          AWS_REGION=${{ secrets.AWS_REGION }}
          SPRING_PROFILES_ACTIVE=prod
          SSL_CERT_PATH=${{ secrets.SSL_CERT_PATH }}
          MYSQL_USER=${{ secrets.MYSQL_USER }}
          MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}
          MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
          GOOGLE_OAUTH_CLIENT_ID=${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET=${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          TRUSTED_PROXY_IPS=172.16.0.0/12
          CORS_ALLOWED_ORIGINS=https://dante-planner.com
          ENV_EOF

          # ECR 로그인 및 컨테이너 실행
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
          docker compose pull
          docker compose down --remove-orphans
          docker compose up -d --force-recreate
          docker image prune -f
          INNER_BATCH
          EOF

          # 2. jq를 사용하여 안전한 JSON 생성 (파일로부터 읽기)
          jq -n --rawfile cmd raw_script.sh '{"commands": [$cmd]}' > ssm_params.json

          # 3. SSM 명령어 전송 (파일 참조 방식)
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters file://ssm_params.json \
            --query "Command.CommandId" --output text)

          echo "Command ID: $COMMAND_ID"

          # 4. 결과 대기
          aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "${{ secrets.EC2_INSTANCE_ID }}" || true
          
          # 5. 상세 결과 확인 및 로그 출력
          INVOCATION_RESULT=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}")
          
          STATUS=$(echo "$INVOCATION_RESULT" | jq -r '.Status')
          echo "Final Status: $STATUS"

          if [ "$STATUS" != "Success" ]; then
            echo "--- ERROR LOG ---"
            echo "$INVOCATION_RESULT" | jq -r '.StandardErrorContent'
            exit 1
          fi

  # 4. Health Check (SSM을 통해 localhost에서 확인)
  health-check:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      healthy: ${{ steps.check.outputs.healthy }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Health check via SSM
        id: check
        run: |
          # Wait for containers to stabilize
          sleep 30

          RAW_COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["curl -sf http://localhost/health && curl -sf http://localhost/actuator/health || exit 1"]' \
            --query "Command.CommandId" --output text)

          COMMAND_ID=$(echo $RAW_COMMAND_ID | tr -d '"' | tr -d ' ')
          INSTANCE_ID=$(echo "${{ secrets.EC2_INSTANCE_ID }}" | tr -d '"' | tr -d ' ')

          aws ssm wait command-executed \
            --command-id $COMMAND_ID \
            --instance-id $INSTANCE_ID || true

          HEALTH_STATUS=$(aws ssm get-command-invocation \
            --command-id $COMMAND_ID \
            --instance-id $INSTANCE_ID \
            --query "Status" --output text)

          if [ "$HEALTH_STATUS" = "Success" ]; then
            echo "healthy=true" >> $GITHUB_OUTPUT
            echo "Health check passed"
          else
            echo "healthy=false" >> $GITHUB_OUTPUT
            echo "Health check failed"
            exit 1
          fi

  # 5. Rollback (health-check 실패 시)
  rollback:
    needs: health-check
    if: failure()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Rollback via SSM
        run: |
          echo "Rolling back to previous version..."

          RAW_COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["
              cd ${{ env.DEPLOY_PATH }}

              # Rollback to previous commit
              sudo -u ec2-user bash -c '"'"'
                cd ${{ env.DEPLOY_PATH }}
                git reset --hard HEAD~1

                # Re-export env vars and restart with previous config
                export SPRING_PROFILES_ACTIVE=prod
                docker compose down
                docker compose up -d
              '"'"'
            "]' \
            --query "Command.CommandId" --output text)

          COMMAND_ID=$(echo $RAW_COMMAND_ID | tr -d '"' | tr -d ' ')
          INSTANCE_ID=$(echo "${{ secrets.EC2_INSTANCE_ID }}" | tr -d '"' | tr -d ' ')

          aws ssm wait command-executed \
            --command-id $COMMAND_ID \
            --instance-id $INSTANCE_ID

          ROLLBACK_STATUS=$(aws ssm get-command-invocation \
            --command-id $COMMAND_ID \
            --instance-id $INSTANCE_ID \
            --query "Status" --output text)

          if [ "$ROLLBACK_STATUS" = "Success" ]; then
            echo "Rollback completed successfully"
          else
            echo "Rollback failed - manual intervention required"
            exit 1
          fi
