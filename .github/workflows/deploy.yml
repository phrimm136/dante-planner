name: Deploy to Production

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'nginx/**'
      - 'docker-compose.yml'
      - 'scripts/deploy/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      setup_cloudwatch:
        description: 'Run CloudWatch alarms setup (one-time)'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  DEPLOY_PATH: /opt/danteplanner
  # AWS Account ID와 Region은 Secrets에서 가져와 ECR 주소 생성
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

jobs:
  # 1. Backend 테스트 (Frontend는 Cloudflare에서 처리)
  test-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Run backend tests
        working-directory: ./backend
        run: ./mvnw test -q

  # 2. 빌드 및 ECR 전송 (GitHub Actions에서 수행)
  build-and-push:
    needs: [test-backend]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.ECR_REGISTRY }}/danteplanner-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and Push Nginx
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          tags: ${{ env.ECR_REGISTRY }}/danteplanner-nginx:${{ github.sha }}
          cache-from: type=gha,scope=nginx
          cache-to: type=gha,mode=max,scope=nginx

  # 3. EC2 배포 (SSM을 통한 자동화)
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy via SSM
        env:
          IMAGE_TAG: ${{ github.sha }}
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          SSL_CERT_PATH: ${{ secrets.SSL_CERT_PATH }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GITHUB_REPO: ${{ github.repository }}
          EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          cat <<'EOF' > raw_script.sh
          cd /opt/danteplanner

          # Update source code (need git for fetching deploy scripts)
          if ! command -v git &> /dev/null; then
            sudo yum install -y git
          fi
          if [ ! -d ".git" ]; then
            git clone https://github.com/__GITHUB_REPO__ .
          else
            git fetch origin main
            git reset --hard origin/main
          fi

          # Write deploy config (GitHub secrets -> temp file for scripts)
          cat > /tmp/deploy-config.env <<CONFIG
          IMAGE_TAG=__IMAGE_TAG__
          AWS_ACCOUNT_ID=__AWS_ACCOUNT_ID__
          AWS_REGION=__AWS_REGION__
          SSL_CERT_PATH=__SSL_CERT_PATH__
          MYSQL_USER=__MYSQL_USER__
          MYSQL_DATABASE=__MYSQL_DATABASE__
          GOOGLE_OAUTH_CLIENT_ID=__GOOGLE_OAUTH_CLIENT_ID__
          GITHUB_REPOSITORY=__GITHUB_REPO__
          CONFIG

          DEPLOY_ERRORS=""

          # Critical steps - fail fast
          sudo bash scripts/deploy/install-prerequisites.sh || { echo "[FATAL] Prerequisites failed at exit $?"; exit 1; }
          sudo -u ec2-user bash scripts/deploy/setup-env.sh || { echo "[FATAL] Environment setup failed at exit $?"; exit 1; }
          sudo -u ec2-user bash scripts/deploy/deploy-containers.sh || { echo "[FATAL] Container deploy failed at exit $?"; exit 1; }

          # Non-critical steps - collect errors, continue
          sudo -u ec2-user bash scripts/deploy/setup-cron.sh || DEPLOY_ERRORS="${DEPLOY_ERRORS}cron: exit $?\n"
          sudo -u ec2-user bash scripts/deploy/setup-shell.sh || DEPLOY_ERRORS="${DEPLOY_ERRORS}shell: exit $?\n"

          rm -f /tmp/deploy-config.env

          if [ -n "$DEPLOY_ERRORS" ]; then
            echo "[WARN] Non-critical failures:"
            echo -e "$DEPLOY_ERRORS"
          fi
          EOF

          # Replace placeholders with actual values from env vars
          sed -i "s|__IMAGE_TAG__|$IMAGE_TAG|g" raw_script.sh
          sed -i "s|__AWS_ACCOUNT_ID__|$AWS_ACCOUNT_ID|g" raw_script.sh
          sed -i "s|__AWS_REGION__|$AWS_REGION|g" raw_script.sh
          sed -i "s|__SSL_CERT_PATH__|$SSL_CERT_PATH|g" raw_script.sh
          sed -i "s|__MYSQL_USER__|$MYSQL_USER|g" raw_script.sh
          sed -i "s|__MYSQL_DATABASE__|$MYSQL_DATABASE|g" raw_script.sh
          sed -i "s|__GOOGLE_OAUTH_CLIENT_ID__|$GOOGLE_OAUTH_CLIENT_ID|g" raw_script.sh
          sed -i "s|__GITHUB_REPO__|$GITHUB_REPO|g" raw_script.sh

          jq -n --rawfile cmd raw_script.sh '{"commands": [$cmd]}' > ssm_params.json

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters file://ssm_params.json \
            --query "Command.CommandId" --output text)

          echo "Command ID: $COMMAND_ID"

          aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "$EC2_INSTANCE_ID" || true

          INVOCATION_RESULT=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID")

          STATUS=$(echo "$INVOCATION_RESULT" | jq -r '.Status')
          echo "Final Status: $STATUS"

          echo "--- STDOUT ---"
          echo "$INVOCATION_RESULT" | jq -r '.StandardOutputContent'

          if [ "$STATUS" != "Success" ]; then
            echo "--- ERROR LOG ---"
            echo "$INVOCATION_RESULT" | jq -r '.StandardErrorContent'
            exit 1
          fi

  # 4. Health Check (SSM을 통해 localhost에서 확인)
  health-check:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      healthy: ${{ steps.check.outputs.healthy }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Health check via SSM
        id: check
        env:
          EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["cd /opt/danteplanner && sudo -u ec2-user bash scripts/deploy/health-check.sh"]' \
            --query "Command.CommandId" --output text)

          echo "Command ID: $COMMAND_ID"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" || true

          INVOCATION_RESULT=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID")

          STATUS=$(echo "$INVOCATION_RESULT" | jq -r '.Status')
          echo "--- STDOUT ---"
          echo "$INVOCATION_RESULT" | jq -r '.StandardOutputContent'

          if [ "$STATUS" = "Success" ]; then
            echo "healthy=true" >> $GITHUB_OUTPUT
          else
            echo "healthy=false" >> $GITHUB_OUTPUT
            echo "--- ERROR LOG ---"
            echo "$INVOCATION_RESULT" | jq -r '.StandardErrorContent'
            exit 1
          fi

  # 5. Rollback (health-check 실패 시)
  rollback:
    needs: health-check
    if: failure()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Rollback via SSM
        env:
          EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          echo "Rolling back to previous version..."

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["cd /opt/danteplanner && sudo -u ec2-user bash scripts/deploy/rollback.sh"]' \
            --query "Command.CommandId" --output text)

          echo "Command ID: $COMMAND_ID"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" || true

          INVOCATION_RESULT=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID")

          STATUS=$(echo "$INVOCATION_RESULT" | jq -r '.Status')
          echo "--- STDOUT ---"
          echo "$INVOCATION_RESULT" | jq -r '.StandardOutputContent'

          if [ "$STATUS" = "Success" ]; then
            echo "Rollback completed successfully"
          else
            echo "--- ERROR LOG ---"
            echo "$INVOCATION_RESULT" | jq -r '.StandardErrorContent'
            echo "Rollback failed - manual intervention required"
            exit 1
          fi

  # 6. CloudWatch Setup (one-time, manual trigger only)
  setup-cloudwatch:
    needs: health-check
    if: ${{ github.event.inputs.setup_cloudwatch == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup CloudWatch alarms via SSM
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
        run: |
          echo "Setting up CloudWatch alarms and S3 logging..."

          cat <<'EOF' > cloudwatch_script.sh
          cd /opt/danteplanner
          sudo -u ec2-user bash -e <<'INNER_BATCH'
          cd /opt/danteplanner

          # Export environment for the script
          export AWS_REGION="__AWS_REGION__"
          export EC2_INSTANCE_ID="__INSTANCE_ID__"
          export ALERT_EMAIL="__ALERT_EMAIL__"
          export S3_BACKUP_BUCKET="danteplanner-backups"
          export S3_LOGS_BUCKET="danteplanner-logs"

          # Run the setup script
          chmod +x scripts/setup-cloudwatch-alarms.sh
          ./scripts/setup-cloudwatch-alarms.sh
          INNER_BATCH
          EOF

          # Replace placeholders with actual values
          sed -i "s|__AWS_REGION__|$AWS_REGION|g" cloudwatch_script.sh
          sed -i "s|__INSTANCE_ID__|$INSTANCE_ID|g" cloudwatch_script.sh
          sed -i "s|__ALERT_EMAIL__|$ALERT_EMAIL|g" cloudwatch_script.sh

          jq -n --rawfile cmd cloudwatch_script.sh '{"commands": [$cmd]}' > cloudwatch_params.json

          RAW_COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters file://cloudwatch_params.json \
            --query "Command.CommandId" --output text)

          COMMAND_ID=$(echo $RAW_COMMAND_ID | tr -d '"' | tr -d ' ')
          CLEAN_INSTANCE_ID=$(echo "$INSTANCE_ID" | tr -d '"' | tr -d ' ')

          echo "Command ID: $COMMAND_ID"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$CLEAN_INSTANCE_ID" || true

          RESULT=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$CLEAN_INSTANCE_ID")

          STATUS=$(echo "$RESULT" | jq -r '.Status')
          echo "Status: $STATUS"

          # Always show stdout
          echo "--- STDOUT ---"
          echo "$RESULT" | jq -r '.StandardOutputContent'

          if [ "$STATUS" != "Success" ]; then
            echo "--- STDERR ---"
            echo "$RESULT" | jq -r '.StandardErrorContent'
            exit 1
          fi

          echo ""
          echo "CloudWatch setup completed successfully"
