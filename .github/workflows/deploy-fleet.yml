name: "Deploy (multi-region k3s)"

# Production GitOps deploy for the two-region k3s fleet (supersedes the legacy
# single-EC2 deploy.yml). Build the arm64 backend image once, push it to BOTH
# regional ECR registries (Oregon primary + Seoul), then bump the kustomize image
# tag in BOTH overlays and commit. Each region's ArgoCD core syncs the commit and
# pulls the image from its LOCAL registry — pushing to both here removes the
# cross-region ECR-replication race (a bump could otherwise reference a tag not
# yet replicated to Seoul).
on:
  push:
    # Images are built and pushed to ECR only when a PR merges to main; both
    # regions' ArgoCD root apps track main. workflow_dispatch remains as the
    # manual escape hatch.
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-fleet.yml'
  workflow_dispatch:

concurrency:
  group: k3s-gitops-deploy
  cancel-in-progress: false

env:
  # Oregon (primary) + Seoul registries. AWS_REGION = us-west-2; Seoul is fixed.
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
  SEOUL_REGION: ap-northeast-2
  ECR_REGISTRY_SEOUL: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-northeast-2.amazonaws.com
  IMAGE_REPO: danteplanner-backend
  OVERLAY_DIR: deploy/overlays/oregon
  OVERLAY_DIR_SEOUL: deploy/overlays/seoul

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      # The private data submodule is baked into the backend image; fetch it
      # with a read-only deploy key.
      - name: Fetch data submodule
        env:
          STATIC_DEPLOY_KEY: ${{ secrets.STATIC_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$STATIC_DEPLOY_KEY" > ~/.ssh/static_key
          chmod 600 ~/.ssh/static_key
          ssh-keyscan -t ed25519,rsa github.com >> ~/.ssh/known_hosts 2>/dev/null
          GIT_SSH_COMMAND="ssh -i ~/.ssh/static_key -o IdentitiesOnly=yes" \
            git submodule update --init --depth 1 static

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Log in to BOTH regional ECR registries. The action has no region input;
      # it targets the region resolved from AWS_REGION (us-west-2 by default),
      # so the Seoul step shadows AWS_REGION for that step only.
      - name: Login to Amazon ECR (Oregon)
        uses: aws-actions/amazon-ecr-login@v2

      - name: Login to Amazon ECR (Seoul)
        uses: aws-actions/amazon-ecr-login@v2
        env:
          AWS_REGION: ${{ env.SEOUL_REGION }}
          AWS_DEFAULT_REGION: ${{ env.SEOUL_REGION }}

      # arm64 (Graviton t4g fleet) built on the amd64 runner via QEMU emulation.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # One build, pushed to both regional registries under the same tag, so each
      # region pulls locally and the tags in both overlays resolve.
      - name: Build and Push Backend (arm64) to both regions
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./backend/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.IMAGE_REPO }}:${{ github.sha }}
            ${{ env.ECR_REGISTRY_SEOUL }}/${{ env.IMAGE_REPO }}:${{ github.sha }}
          cache-from: type=gha,scope=backend-arm64
          cache-to: type=gha,mode=max,scope=backend-arm64

  # Deploy surge: the app tier is a DaemonSet on ASG nodes (node count = pod
  # count) and two Spring heaps do not fit one 2GiB t4g.small, so zero-downtime
  # needs a second NODE, not a second pod. Both app ASGs go to 2 BEFORE the tag
  # bump lands — if ArgoCD synced the bump first, maxUnavailable=1 would kill
  # the region's only pod before the surge node exists. settle-down returns the
  # ASGs to 1 after the rollout completes.
  surge-up:
    needs: build-push
    runs-on: ubuntu-latest
    permissions: {}
    timeout-minutes: 20
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Scale app ASGs to 2
        run: |
          aws autoscaling set-desired-capacity --region "${{ secrets.AWS_REGION }}" \
            --auto-scaling-group-name danteplanner-oregon-app --desired-capacity 2
          aws autoscaling set-desired-capacity --region "$SEOUL_REGION" \
            --auto-scaling-group-name danteplanner-seoul-app --desired-capacity 2

      - name: Wait until both ASGs have 2 InService nodes
        run: |
          wait_asg() {
            local region="$1" asg="$2" n=0
            for _ in $(seq 1 40); do
              n=$(aws autoscaling describe-auto-scaling-groups --region "$region" \
                --auto-scaling-group-names "$asg" \
                --query 'length(AutoScalingGroups[0].Instances[?LifecycleState==`InService`])' \
                --output text)
              [ "$n" -ge 2 ] && return 0
              sleep 10
            done
            echo "::error::$asg did not reach 2 InService nodes"
            return 1
          }
          wait_asg "${{ secrets.AWS_REGION }}" danteplanner-oregon-app
          wait_asg "$SEOUL_REGION" danteplanner-seoul-app

      # ASG InService is EC2-level only; the DaemonSet can start rolling as soon
      # as the bump syncs, so the surge node must be a READY k3s node first or
      # the roll can still hit a 0-ready window. Counting happens runner-side
      # (grep -cw skips NotReady) so the remote command stays quote-free.
      - name: Wait until both clusters see 2 Ready app nodes
        run: |
          ssm_out() {
            local region="$1" iid="$2" cmd="$3" cid status=Pending
            cid=$(aws ssm send-command --region "$region" --instance-ids "$iid" \
              --document-name AWS-RunShellScript \
              --parameters "{\"commands\":[\"$cmd\"]}" \
              --query Command.CommandId --output text)
            for _ in $(seq 1 24); do
              sleep 5
              status=$(aws ssm get-command-invocation --region "$region" --command-id "$cid" \
                --instance-id "$iid" --query Status --output text 2>/dev/null || echo Pending)
              case "$status" in Success|Failed|TimedOut|Cancelled) break;; esac
            done
            aws ssm get-command-invocation --region "$region" --command-id "$cid" \
              --instance-id "$iid" --query StandardOutputContent --output text
            [ "$status" = Success ]
          }
          cp_id() {
            aws ec2 describe-instances --region "$1" \
              --filters "Name=tag:Name,Values=$2" "Name=instance-state-name,Values=running" \
              --query 'Reservations[0].Instances[0].InstanceId' --output text
          }
          wait_ready() {
            local region="$1" cp="$2" iid n=0
            iid=$(cp_id "$region" "$cp")
            for _ in $(seq 1 30); do
              n=$(ssm_out "$region" "$iid" "sudo k3s kubectl get nodes -l role=app --no-headers" | grep -cw Ready || true)
              [ "$n" -ge 2 ] && return 0
              sleep 15
            done
            echo "::error::$cp never reached 2 Ready app nodes (last: $n)"
            return 1
          }
          wait_ready "${{ secrets.AWS_REGION }}" danteplanner-oregon-cp
          wait_ready "$SEOUL_REGION" danteplanner-seoul-cp

  bump-tag:
    needs: [build-push, surge-up]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 10
    env:
      GIT_SHA: ${{ github.sha }}
    steps:
      # Owner-scoped fine-grained PAT (contents:write). The bump push must carry
      # the repository-admin identity: dev/main sit behind a code-scanning
      # ruleset whose only usable bypass on a personal account is the admin
      # role — the github-actions app cannot be a bypass actor outside an org.
      # [skip ci] + the backend-only path filter keep the PAT push from
      # retriggering this workflow.
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          token: ${{ secrets.GH_DEPLOY_PAT }}

      # Pinned direct download: the upstream install script resolves "latest"
      # through the GitHub REST API, which shared-runner IPs get rate-limited
      # on; release-asset URLs carry no API rate limit.
      - name: Install kustomize
        env:
          KUSTOMIZE_VERSION: v5.8.1
        run: |
          curl -sfLo kustomize.tar.gz "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2F${KUSTOMIZE_VERSION}/kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz"
          tar -xzf kustomize.tar.gz kustomize
          sudo mv kustomize /usr/local/bin/

      - name: Bump image tag in BOTH overlays
        run: |
          (cd "$OVERLAY_DIR"       && kustomize edit set image "${IMAGE_REPO}:${GIT_SHA}")
          (cd "$OVERLAY_DIR_SEOUL" && kustomize edit set image "${IMAGE_REPO}:${GIT_SHA}")

      - name: Commit the tag bump
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          if git diff --quiet; then
            echo "No image change to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$OVERLAY_DIR/kustomization.yaml" "$OVERLAY_DIR_SEOUL/kustomization.yaml"
          # [skip ci] + the backend-only path filter keep this from retriggering.
          git commit -m "chore(deploy): bump backend image to ${GIT_SHA} (Oregon+Seoul) [skip ci]"
          git push origin "HEAD:${REF_NAME}"

  # After ArgoCD syncs the bump, verify the DaemonSet template actually carries
  # the new image and the rollout completes on BOTH clusters (checked over SSM
  # on each CP), then scale the surge nodes back in. On any failure the surge
  # stays up deliberately — two serving nodes during an incident beats a blind
  # scale-in; the job failure is the signal to investigate.
  settle-down:
    needs: [bump-tag, surge-up]
    runs-on: ubuntu-latest
    permissions: {}
    timeout-minutes: 25
    env:
      GIT_SHA: ${{ github.sha }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Wait for rollout on both clusters
        run: |
          ssm_out() {
            local region="$1" iid="$2" cmd="$3" cid status=Pending
            cid=$(aws ssm send-command --region "$region" --instance-ids "$iid" \
              --document-name AWS-RunShellScript \
              --parameters "{\"commands\":[\"$cmd\"]}" \
              --query Command.CommandId --output text)
            for _ in $(seq 1 150); do
              sleep 5
              status=$(aws ssm get-command-invocation --region "$region" --command-id "$cid" \
                --instance-id "$iid" --query Status --output text 2>/dev/null || echo Pending)
              case "$status" in Success|Failed|TimedOut|Cancelled) break;; esac
            done
            aws ssm get-command-invocation --region "$region" --command-id "$cid" \
              --instance-id "$iid" --query StandardOutputContent --output text
            [ "$status" = Success ]
          }
          cp_id() {
            aws ec2 describe-instances --region "$1" \
              --filters "Name=tag:Name,Values=$2" "Name=instance-state-name,Values=running" \
              --query 'Reservations[0].Instances[0].InstanceId' --output text
          }
          wait_cluster() {
            local region="$1" cp="$2" iid img=""
            iid=$(cp_id "$region" "$cp")
            # ArgoCD reconcile can lag the push by ~3 min; wait for the template
            # to carry the new SHA before trusting rollout status (which passes
            # trivially against the OLD revision).
            for _ in $(seq 1 40); do
              img=$(ssm_out "$region" "$iid" "sudo k3s kubectl get ds backend -n danteplanner -o jsonpath={.spec.template.spec.containers[0].image}") || true
              case "$img" in *"$GIT_SHA"*) break;; esac
              sleep 10
            done
            case "$img" in
              *"$GIT_SHA"*) ;;
              *) echo "::error::$cp never synced $GIT_SHA"; return 1;;
            esac
            ssm_out "$region" "$iid" "sudo k3s kubectl rollout status ds/backend -n danteplanner --timeout=600s"
          }
          wait_cluster "${{ secrets.AWS_REGION }}" danteplanner-oregon-cp
          wait_cluster "$SEOUL_REGION" danteplanner-seoul-cp

      - name: Annotate Grafana with deploy marker
        env:
          GRAFANA_TOKEN: ${{ secrets.GRAFANA_ANNOTATIONS_TOKEN }}
          GRAFANA_URL: ${{ vars.GRAFANA_URL }}
        run: |
          short_sha=$(printf '%s' "$GIT_SHA" | cut -c1-8)
          for cluster in oregon seoul; do
            now_ms=$(date +%s%3N)
            body=$(cat <<EOF
          {"tags":["deploy","cluster:$cluster","sha:$GIT_SHA"],"text":"Deployed backend $short_sha to $cluster","time":$now_ms}
          EOF
          )
            curl --silent --show-error --fail -X POST "$GRAFANA_URL/api/annotations" \
              -H "Authorization: Bearer $GRAFANA_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$body" \
              || echo "::warning::Grafana deploy-marker POST failed for $cluster"
          done

      # Scale-in must not black-hole traffic: a bare desired-capacity decrement
      # kills the EC2 without draining, and the dead pod lingers in the Service
      # endpoints while Traefik keeps routing to it (observed as a half-outage
      # window on the first surge run). DaemonSets ignore cordon, so evict the
      # pod with a NoExecute taint, wait until the Service is down to a single
      # endpoint, then terminate the SURGE instance specifically (newest launch)
      # with a capacity decrement — and delete the k8s node object so no
      # NotReady ghost accumulates.
      - name: Drain surge nodes and scale back to 1
        run: |
          ssm_out() {
            local region="$1" iid="$2" cmd="$3" cid status=Pending
            cid=$(aws ssm send-command --region "$region" --instance-ids "$iid" \
              --document-name AWS-RunShellScript \
              --parameters "{\"commands\":[\"$cmd\"]}" \
              --query Command.CommandId --output text)
            for _ in $(seq 1 24); do
              sleep 5
              status=$(aws ssm get-command-invocation --region "$region" --command-id "$cid" \
                --instance-id "$iid" --query Status --output text 2>/dev/null || echo Pending)
              case "$status" in Success|Failed|TimedOut|Cancelled) break;; esac
            done
            aws ssm get-command-invocation --region "$region" --command-id "$cid" \
              --instance-id "$iid" --query StandardOutputContent --output text
            [ "$status" = Success ]
          }
          cp_id() {
            aws ec2 describe-instances --region "$1" \
              --filters "Name=tag:Name,Values=$2" "Name=instance-state-name,Values=running" \
              --query 'Reservations[0].Instances[0].InstanceId' --output text
          }
          drain_and_scale_in() {
            local region="$1" asg="$2" cp="$3" cp_iid ids surge_iid node_ip node eps=0
            cp_iid=$(cp_id "$region" "$cp")
            ids=$(aws autoscaling describe-auto-scaling-groups --region "$region" \
              --auto-scaling-group-names "$asg" \
              --query 'AutoScalingGroups[0].Instances[?LifecycleState==`InService`].InstanceId' \
              --output text)
            if [ "$(echo "$ids" | wc -w)" -lt 2 ]; then
              echo "$asg has no surge node to remove"
              return 0
            fi
            surge_iid=$(aws ec2 describe-instances --region "$region" --instance-ids $ids \
              --query 'sort_by(Reservations[].Instances[], &LaunchTime)[-1].InstanceId' --output text)
            node_ip=$(aws ec2 describe-instances --region "$region" --instance-ids "$surge_iid" \
              --query 'Reservations[0].Instances[0].PrivateIpAddress' --output text)
            node="ip-$(echo "$node_ip" | tr . -).$region.compute.internal"
            ssm_out "$region" "$cp_iid" "sudo k3s kubectl taint node $node danteplanner.dev/retiring=true:NoExecute --overwrite"
            for _ in $(seq 1 24); do
              eps=$(ssm_out "$region" "$cp_iid" "sudo k3s kubectl get endpoints backend -n danteplanner --no-headers" \
                | awk '{print $2}' | tr ',' '\n' | grep -c ':' || true)
              [ "$eps" = "1" ] && break
              sleep 5
            done
            if [ "$eps" != "1" ]; then
              echo "::error::$asg Service endpoints never settled to 1 after draining $node"
              return 1
            fi
            aws autoscaling terminate-instance-in-auto-scaling-group --region "$region" \
              --instance-id "$surge_iid" --should-decrement-desired-capacity >/dev/null
            ssm_out "$region" "$cp_iid" "sudo k3s kubectl delete node $node" || true
          }
          drain_and_scale_in "${{ secrets.AWS_REGION }}" danteplanner-oregon-app danteplanner-oregon-cp
          drain_and_scale_in "$SEOUL_REGION" danteplanner-seoul-app danteplanner-seoul-cp
