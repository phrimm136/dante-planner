name: Notify CI Failure
description: Post a failure comment on the associated PR with log snippet from the failed step

inputs:
  title:
    description: 'Comment title (e.g., "CI Failed — Backend")'
    required: true
  jobs-json:
    description: 'JSON array of [{name, result}] for the status table'
    required: true
  pr-number:
    description: 'PR number. If empty, looks up via commit SHA'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Get failed logs
      id: logs
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        RAW=$(gh run view ${{ github.run_id }} --log-failed \
          -R ${{ github.repository }} 2>&1) || true

        if [ -z "$RAW" ]; then
          echo "snippet=" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        FAILED_JOB=$(echo "$RAW" | head -1 | cut -f1)
        FAILED_STEP=$(echo "$RAW" | head -1 | cut -f2)

        SNIPPET=$(echo "$RAW" | \
          sed -e 's/^[^\t]*\t[^\t]*\t//' \
              -e 's/^[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}T[0-9:\.]*Z //' \
              -e '/^##\[group\]/d' \
              -e '/^##\[endgroup\]/d' \
              -e 's/^##\[error\]/Error: /' \
              -e '/^##\[/d' \
              -e 's/\x1b\[[0-9;]*m//g' | \
          awk '!s && /^[[:space:]]/ {next} {s=1} 1' | \
          tail -30)

        {
          echo "failed-job=$FAILED_JOB"
          echo "failed-step=$FAILED_STEP"
          echo "snippet<<__LOG_EOF__"
          echo "$SNIPPET"
          echo "__LOG_EOF__"
        } >> "$GITHUB_OUTPUT"

    - uses: actions/github-script@v8
      env:
        INPUT_TITLE: ${{ inputs.title }}
        INPUT_JOBS_JSON: ${{ inputs.jobs-json }}
        INPUT_PR_NUMBER: ${{ inputs.pr-number }}
        FAILED_JOB: ${{ steps.logs.outputs.failed-job }}
        FAILED_STEP: ${{ steps.logs.outputs.failed-step }}
        LOG_SNIPPET: ${{ steps.logs.outputs.snippet }}
      with:
        script: |
          let prNumber = parseInt(process.env.INPUT_PR_NUMBER, 10);
          if (!prNumber) {
            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner, repo: context.repo.repo, commit_sha: context.sha,
            });
            if (!prs.data.length) return;
            prNumber = prs.data[0].number;
          }

          const icon = r => ({success:'✅',failure:'❌',skipped:'⏭️',cancelled:'🚫'}[r] ?? '❓');
          const jobEntries = JSON.parse(process.env.INPUT_JOBS_JSON);
          const rows = jobEntries
            .map(({name, result}) => `| ${name} | ${icon(result)} \`${result}\` |`)
            .join('\n');

          const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
          const failedJobName = process.env.FAILED_JOB;
          const failedStepName = process.env.FAILED_STEP;

          let jobUrl = null;
          if (failedJobName) {
            try {
              const { data: { jobs } } = await github.rest.actions.listJobsForWorkflowRun({
                owner: context.repo.owner, repo: context.repo.repo, run_id: context.runId,
              });
              const job = jobs.find(j => j.name === failedJobName);
              if (job) jobUrl = `${runUrl}/job/${job.id}`;
            } catch {}
          }

          const failedLine = failedJobName
            ? `\n**Failed:** ${failedJobName}${failedStepName ? ` → ${failedStepName}` : ''}`
            : '';

          const snippet = process.env.LOG_SNIPPET || '';
          const logBlock = snippet
            ? `\n<details>\n<summary>Log snippet</summary>\n\n\`\`\`\n${snippet}\n\`\`\`\n</details>`
            : '\n> Log unavailable';

          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: prNumber,
            body: [
              `## ❌ ${process.env.INPUT_TITLE}`,
              '',
              '| Job | Status |',
              '|-----|--------|',
              rows,
              failedLine,
              logBlock,
              '',
              jobUrl ? `[→ Failed job](${jobUrl}) · [→ Full run](${runUrl})` : `[→ View run](${runUrl})`,
            ].join('\n'),
          });
