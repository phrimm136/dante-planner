spring.application.name=Backend-Test

# Allow bean definition override for test configuration
spring.main.allow-bean-definition-overriding=true

# H2 In-Memory Database Configuration for Tests
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Disable Flyway for tests (use JPA auto-DDL instead)
spring.flyway.enabled=false

# JWT Configuration for Tests
jwt.secret=test-secret-key-for-testing-purposes-only-min-256-bits-required
jwt.access-token-expiry=900000
jwt.refresh-token-expiry=604800000

# CORS Configuration
cors.allowed-origins=http://localhost:5173

# OAuth Configuration (disabled for tests)
oauth.google.client-id=test-client-id
oauth.google.client-secret=test-client-secret
oauth.google.redirect-uri=http://localhost:5173/auth/callback

# Rate Limiting Configuration for Tests
rate-limit.crud.capacity=60
rate-limit.crud.refill-tokens=60
rate-limit.crud.refill-duration-seconds=60
rate-limit.import-config.capacity=10
rate-limit.import-config.refill-tokens=10
rate-limit.import-config.refill-duration-seconds=60
rate-limit.sse.capacity=1
rate-limit.sse.refill-tokens=1
rate-limit.sse.refill-duration-seconds=60

# Planner Configuration for Tests
planner.max-per-user=100
planner.recommended-threshold=10
