# MySQL TestContainers Configuration for Integration Tests
# This profile is activated by @ActiveProfiles("it") in MySQLIntegrationTest

spring.application.name=Backend-IT

# Allow bean definition overriding (TestConfig objectMapper overrides JacksonConfig)
spring.main.allow-bean-definition-overriding=true

# Datasource is configured dynamically by @DynamicPropertySource in MySQLIntegrationTest
# These are placeholders that will be overridden
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MySQL Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Schema validation (use Hibernate DDL, not Flyway)
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false

# Show SQL for debugging
spring.jpa.show-sql=true

# JWT Configuration (same as test profile)
jwt.private-key-path=src/test/resources/test-keys/private_key.pem
jwt.public-key-path=src/test/resources/test-keys/public_key.pem
jwt.encryption-key=E9dzesGJ+MrmIaVssATsvvP9EOc1M/Cj/u+9Bh1WTBg=
jwt.access-token-expiry=900000
jwt.refresh-token-expiry=604800000

# CORS Configuration
cors.allowed-origins=http://localhost:5173

# OAuth Configuration (dummy values for tests)
oauth.google.client-id=test-client-id
oauth.google.client-secret=test-client-secret
oauth.google.redirect-uri=http://localhost:5173/auth/callback

# Rate Limiting Configuration for Tests
rate-limit.crud.capacity=1000
rate-limit.crud.refill-tokens=1000
rate-limit.crud.refill-duration-seconds=60
rate-limit.import-config.capacity=10
rate-limit.import-config.refill-tokens=10
rate-limit.import-config.refill-duration-seconds=60
rate-limit.sse.capacity=1
rate-limit.sse.refill-tokens=1
rate-limit.sse.refill-duration-seconds=60

# Planner Configuration for Tests
planner.max-per-user=100
planner.recommended-threshold=10

# Planner Validation for Tests
planner.validation.max-content-size=51200
planner.validation.max-note-size=1024

# User Deletion Configuration for Tests
app.user.deletion.grace-period-days=30
app.user.cleanup.cron=0 0 3 * * *
