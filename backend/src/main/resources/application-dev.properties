# Development Profile Configuration
# This profile is automatically activated when running in Docker Compose

# Database Configuration (Docker hostnames)
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:mysql}:${MYSQL_PORT:3306}/${MYSQL_DATABASE}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.flyway.url=jdbc:mysql://${MYSQL_HOST:mysql}:${MYSQL_PORT:3306}/${MYSQL_DATABASE}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

# CORS Configuration (Docker nginx + frontend dev server)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost}

# JPA Configuration (verbose for development)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# OAuth Configuration (Vite dev server)
oauth.google.redirect-uri=http://localhost:5173/auth/callback/google

# Cookie Configuration (same-origin via Vite proxy)
cookie.secure=false
cookie.same-site=Lax

# Logging Configuration (debug for development)
logging.level.root=DEBUG
logging.level.org.danteplanner=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.flywaydb=DEBUG
logging.level.org.springframework.boot.autoconfigure=DEBUG

# Suppress SSE client disconnection noise (broken pipe, connection reset)
# These are expected when clients close browsers or networks interrupt
logging.level.org.springframework.web.servlet.mvc.method.annotation.ResponseBodyEmitter=WARN
logging.level.org.apache.catalina.connector.CoyoteAdapter=WARN
