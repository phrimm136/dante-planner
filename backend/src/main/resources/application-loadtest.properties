# Load Test Profile
# Activate alongside dev: --spring.profiles.active=dev,loadtest
#
# What this does:
#   - Exposes /actuator/metrics so you can watch pool saturation live
#   - Removes rate limiting so throughput reflects server capacity, not rate limits
#
# What to monitor during the test:
#   curl -s http://localhost:8080/actuator/metrics/hikari_pool_pending | grep value
#   curl -s http://localhost:8080/actuator/metrics/hikari_pool_active  | grep value
#   docker stats --format "table {{.Name}}\t{{.CPUPerc}}\t{{.MemUsage}}" backend mysql

# Expose metrics endpoint (dev profile only exposes health)
management.endpoints.web.exposure.include=health,metrics

# Rate limits set high — only the endpoint types hit by load-test.js are raised
rate-limit.crud.capacity=100000
rate-limit.crud.refill-tokens=100000
rate-limit.crud.refill-duration-seconds=60
rate-limit.comment.capacity=100000
rate-limit.comment.refill-tokens=100000
rate-limit.comment.refill-duration-seconds=60
rate-limit.auth.capacity=100000
rate-limit.auth.refill-tokens=100000
rate-limit.auth.refill-duration-seconds=60
