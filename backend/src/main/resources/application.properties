spring.application.name=Backend

# MySQL Configuration
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:danteplanner}
spring.datasource.username=${MYSQL_USER:danteplanner}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configuration
jwt.secret=${JWT_SECRET:default-secret-key-please-change-in-production-min-256-bits}
jwt.access-token-expiry=900000
jwt.refresh-token-expiry=604800000

# CORS Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# OAuth Configuration
oauth.google.client-id=${GOOGLE_OAUTH_CLIENT_ID:}
oauth.google.client-secret=${GOOGLE_OAUTH_CLIENT_SECRET:}
oauth.google.redirect-uri=${GOOGLE_OAUTH_REDIRECT_URI:http://localhost:5173/auth/callback}
oauth.apple.client-id=${APPLE_CLIENT_ID:}
oauth.apple.team-id=${APPLE_TEAM_ID:}
oauth.apple.key-id=${APPLE_KEY_ID:}
oauth.apple.private-key-path=${APPLE_PRIVATE_KEY_PATH:}

# Rate Limiting Configuration
rate-limit.crud.capacity=60
rate-limit.crud.refill-tokens=60
rate-limit.crud.refill-duration-seconds=60
rate-limit.import-config.capacity=10
rate-limit.import-config.refill-tokens=10
rate-limit.import-config.refill-duration-seconds=60
rate-limit.sse.capacity=1
rate-limit.sse.refill-tokens=1
rate-limit.sse.refill-duration-seconds=60

# Planner Configuration
planner.max-per-user=100
planner.recommended-threshold=10

# Planner Validation
planner.validation.max-content-size=51200
planner.validation.max-note-size=1024
