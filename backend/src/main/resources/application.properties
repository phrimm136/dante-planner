spring.application.name=Backend

# MySQL Configuration
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:danteplanner}
spring.datasource.username=${MYSQL_USER:danteplanner}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Disable OSIV to prevent SSE connections from holding DB connections
spring.jpa.open-in-view=false

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.driver-class-name=com.mysql.cj.jdbc.Driver
spring.flyway.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:danteplanner}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.flyway.user=${MYSQL_USER:danteplanner}
spring.flyway.password=${MYSQL_PASSWORD:}
spring.flyway.baseline-on-migrate=false
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=false
spring.flyway.sql-migration-prefix=V
spring.flyway.sql-migration-separator=__
spring.flyway.sql-migration-suffixes=.sql

# JWT Configuration
jwt.private-key-path=${JWT_PRIVATE_KEY_PATH:}
jwt.public-key-path=${JWT_PUBLIC_KEY_PATH:}
jwt.encryption-key=${JWT_ENCRYPTION_KEY:}
jwt.access-token-expiry=900000
jwt.refresh-token-expiry=604800000

# CORS Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Cookie Configuration
cookie.secure=${COOKIE_SECURE:false}
cookie.domain=${COOKIE_DOMAIN:}
cookie.same-site=${COOKIE_SAME_SITE:Lax}

# OAuth Configuration
oauth.google.client-id=${GOOGLE_OAUTH_CLIENT_ID:}
oauth.google.client-secret=${GOOGLE_OAUTH_CLIENT_SECRET:}
oauth.google.redirect-uri=${GOOGLE_OAUTH_REDIRECT_URI:http://localhost:5173/auth/callback/google}
oauth.apple.client-id=${APPLE_CLIENT_ID:}
oauth.apple.team-id=${APPLE_TEAM_ID:}
oauth.apple.key-id=${APPLE_KEY_ID:}
oauth.apple.private-key-path=${APPLE_PRIVATE_KEY_PATH:}

# Rate Limiting Configuration
rate-limit.crud.capacity=60
rate-limit.crud.refill-tokens=60
rate-limit.crud.refill-duration-seconds=60
rate-limit.import-config.capacity=10
rate-limit.import-config.refill-tokens=10
rate-limit.import-config.refill-duration-seconds=60
# SSE: Allow reconnections (page refresh, network recovery, multiple tabs)
# 15 initial capacity, refills 1/sec for sustained reconnections
rate-limit.sse.capacity=15
rate-limit.sse.refill-tokens=10
rate-limit.sse.refill-duration-seconds=10
rate-limit.auth.capacity=5
rate-limit.auth.refill-tokens=5
rate-limit.auth.refill-duration-seconds=60
rate-limit.comment.capacity=10
rate-limit.comment.refill-tokens=10
rate-limit.comment.refill-duration-seconds=60
rate-limit.report.capacity=3
rate-limit.report.refill-tokens=3
rate-limit.report.refill-duration-seconds=3600
rate-limit.moderation.capacity=20
rate-limit.moderation.refill-tokens=20
rate-limit.moderation.refill-duration-seconds=60

# Planner Configuration
planner.max-per-user=100
planner.recommended-threshold=10

# Planner Schema Version (incremented when planner data structure changes)
planner.schema-version=1

# Planner Content Versions (updated when new game content is released)
# md.current-version: Used by frontend for new planners
# md.available-versions: Valid versions for validation (includes current + legacy)
planner.md.current-version=7
planner.md.available-versions=6,7
planner.rr.available-versions=1,5

# Planner Validation
# max-content-size: Total planner content (all data + notes)
# Calculation: (22 notes) × 2048 bytes = 45,056 bytes for notes
#              Note breakdown: 6 sections + 15 floors + 1 deck builder = 22 total
#              + ~30 KB for other planner data (title, deck, keywords, gifts, etc.)
#              = ~75 KB theoretical max
#              Rounded to 80 KB (81920 bytes) for safety margin
planner.validation.max-content-size=81920
planner.validation.max-note-size=2048

# User Deletion Configuration
app.user.deletion.grace-period-days=30
app.user.cleanup.cron=0 0 3 * * *

# Security Configuration
# Enable Spring's native forwarded header processing for reverse proxy support
server.forward-headers-strategy=native

# Trusted proxy IPs for X-Forwarded-For header validation
# Only trust X-Forwarded-For when request comes from these IPs (nginx reverse proxy)
# Comma-separated for multiple proxies, e.g., "10.0.0.1,10.0.0.2"
security.trusted-proxy-ips=${TRUSTED_PROXY_IPS:127.0.0.1}

# Actuator Configuration (Health checks for Docker)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Sentry Configuration (disabled in dev - empty DSN)
sentry.dsn=
