# Production Profile Configuration
# Activate with: SPRING_PROFILES_ACTIVE=prod

# Database Configuration
# Override with production database URL
# spring.datasource.url=jdbc:mysql://production-db-host:3306/danteplanner?useSSL=true&serverTimezone=UTC

# CORS Configuration
# IMPORTANT: Change to HTTPS domain in production
# security.cors.allowed-origins=https://yourdomain.com

# OAuth Configuration (set via env var in production)
# oauth.google.redirect-uri=https://yourdomain.com/auth/callback/google

# Cookie Configuration for cross-origin (Cloudflare frontend + separate backend)
# IMPORTANT: Both frontend and backend must be subdomains of the same parent domain
# Example: frontend=app.limbusplanner.com, backend=api.limbusplanner.com
# cookie.domain=.limbusplanner.com
# cookie.same-site=None
# cookie.secure=true

# JPA Configuration (quiet for production)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Logging Configuration (info for production)
logging.level.org.danteplanner=INFO
logging.level.org.springframework.security=INFO

# Actuator Configuration (restrict endpoints in production)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
