# Production Profile Configuration
# Activate with: SPRING_PROFILES_ACTIVE=prod

# Database Configuration
# Override with production database URL
# spring.datasource.url=jdbc:mysql://production-db-host:3306/danteplanner?useSSL=true&serverTimezone=UTC

# CORS Configuration
cors.allowed-origins=https://dante-planner.com

# OAuth Configuration
oauth.google.redirect-uri=https://dante-planner.com/auth/callback/google

# Cookie Configuration for cross-subdomain (frontend + api subdomain)
# Leading dot allows cookie sharing across subdomains
cookie.domain=dante-planner.com
cookie.same-site=Lax
cookie.secure=true

# JPA Configuration (quiet for production)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Logging Configuration (info for production)
logging.level.org.danteplanner=INFO
logging.level.org.springframework.security=INFO

# Suppress SSE client disconnection noise (broken pipe, connection reset)
# These are expected when clients close browsers or networks interrupt
logging.level.org.springframework.web.servlet.mvc.method.annotation.ResponseBodyEmitter=WARN
logging.level.org.apache.catalina.connector.CoyoteAdapter=WARN

# Actuator Configuration (restrict endpoints in production)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# Sentry Configuration
sentry.dsn=${SENTRY_DSN}
sentry.environment=production
sentry.traces-sample-rate=0.1
sentry.send-default-pii=false
