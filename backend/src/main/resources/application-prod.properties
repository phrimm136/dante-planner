# Production Profile Configuration
# Activate with: SPRING_PROFILES_ACTIVE=prod

# Database Configuration
spring.datasource.url=jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT:3306}/${MYSQL_DATABASE}?sslMode=VERIFY_CA&serverTimezone=UTC&trustCertificateKeyStoreUrl=file:/app/certs/rds-truststore.p12&trustCertificateKeyStoreType=PKCS12&trustCertificateKeyStorePassword=changeit
spring.flyway.url=jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT:3306}/${MYSQL_DATABASE}?sslMode=VERIFY_CA&serverTimezone=UTC&trustCertificateKeyStoreUrl=file:/app/certs/rds-truststore.p12&trustCertificateKeyStoreType=PKCS12&trustCertificateKeyStorePassword=changeit

# Read-local routing (mechanics §5/§6). Both flags default OFF: a region without a
# local read replica must fall through to the plain primary datasource. Seoul turns
# these on in its region ConfigMap; the replica shares the primary's credentials.
datasource.routing.enabled=${DATASOURCE_ROUTING_ENABLED:false}
datasource.replica.enabled=${DATASOURCE_REPLICA_ENABLED:false}
datasource.replica.url=jdbc:mysql://${MYSQL_REPLICA_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:danteplanner}?sslMode=VERIFY_CA&serverTimezone=UTC&trustCertificateKeyStoreUrl=file:/app/certs/rds-truststore.p12&trustCertificateKeyStoreType=PKCS12&trustCertificateKeyStorePassword=changeit
datasource.replica.username=${MYSQL_USER:danteplanner}
datasource.replica.password=${MYSQL_PASSWORD:}

# CORS Configuration
cors.allowed-origins=https://dante-planner.com

# OAuth Configuration
oauth.google.redirect-uri=${GOOGLE_OAUTH_REDIRECT_URI:https://api.dante-planner.com/api/auth/google/callback}

# Cookie Configuration for cross-subdomain (frontend + api subdomain)
# Leading dot allows cookie sharing across subdomains
cookie.domain=dante-planner.com
cookie.same-site=Lax
cookie.secure=true

# JPA Configuration (quiet for production)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Logging Configuration (info for production)
logging.level.org.danteplanner=INFO
logging.level.org.springframework.security=INFO

# Suppress SSE client disconnection noise (broken pipe, connection reset)
# These are expected when clients close browsers or networks interrupt
logging.level.org.springframework.web.servlet.mvc.method.annotation.ResponseBodyEmitter=WARN
logging.level.org.apache.catalina.connector.CoyoteAdapter=WARN

# Actuator Configuration (restrict endpoints in production)
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=never

# Sentry Configuration
sentry.dsn=${SENTRY_DSN}
sentry.environment=production
sentry.traces-sample-rate=0.1
sentry.send-default-pii=false
