<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dante's Planner - Limbus Company Database and Community-driven Planner Tool</title>
    <meta name="description" content="Game planning tool for Limbus Company. Browse Identity, EGO, and EGO Gift databases. Plan Mirror Dungeon runs and build extraction teams." />
    <meta name="theme-color" content="#0e0804" />
    <link rel="canonical" href="https://dante-planner.com/" />
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Dante's Planner" />
    <meta property="og:title" content="Dante's Planner - Limbus Company Guide" />
    <meta property="og:description" content="Game planning tool for Limbus Company. Browse Identity, EGO, and EGO Gift databases. Plan Mirror Dungeon runs and build extraction teams." />
    <meta property="og:url" content="https://dante-planner.com/" />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Dante's Planner - Limbus Company Guide" />
    <meta name="twitter:description" content="Game planning tool for Limbus Company. Browse Identity, EGO, and EGO Gift databases." />
    <style>
      /* Hide SEO skeleton visually (bots still read it) */
      body { background: #0e0804; }
      #seo-skeleton {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
    </style>
    <script>
      // Apply theme before React hydration to prevent flash
      (function() {
        try {
          var theme = localStorage.getItem('theme-preference');
          if (theme === 'dark' || theme === 'light') {
            if (theme === 'dark') {
              document.documentElement.classList.add('dark');
            }
            return;
          }
          // Fallback to browser preference
          if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
            return;
          }
          if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
            return; // light is default
          }
          // Default to dark
          document.documentElement.classList.add('dark');
        } catch (e) {
          // If anything fails, default to dark
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <!-- SEO skeleton - hidden visually, readable by bots -->
      <div id="seo-skeleton">
        <header>
          <a href="/">Dante's Planner - Limbus Company Guide</a>
          <nav>
            <a href="/identity">Identity Database</a>
            <a href="/ego">EGO Database</a>
            <a href="/ego-gift">EGO Gift Database</a>
            <a href="/planner/md">Mirror Dungeon Planner</a>
            <a href="/planner/extraction">Extraction Calculator</a>
            <a href="/planner/deck">Deck Builder</a>
          </nav>
        </header>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
