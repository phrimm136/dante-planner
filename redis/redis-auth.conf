# Durable auth Redis (Oregon primary).
# Holds correctness-bearing state: token blacklist (bl:), rotation families
# (rt:fam:), content tombstones (del:), ShedLock locks, and SSE pub/sub.

# Reachable within the private compose network only; no host port is published
# in the base (prod) file and the backend connects without a password, matching
# the RedisStandaloneConfiguration(host, port) wiring in RedisConnectionConfig.
bind 0.0.0.0
protected-mode no
port 6379

# Hybrid persistence (mechanics.md 034 section 1): AOF for durability with an RDB
# preamble for fast reload. everysec bounds worst-case loss to ~1s of writes
# without paying a per-write fsync.
appendonly yes
appendfsync everysec
aof-use-rdb-preamble yes

# RDB safety-net snapshots (also the AOF rewrite preamble base).
save 900 1
save 300 10
save 60 10000

# Durable store: refuse a write before evicting a blacklist or rotation key.
# A silently evicted revocation would let a logged-out or stolen token back in.
maxmemory-policy noeviction
