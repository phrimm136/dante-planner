# Per-region local ephemeral Redis.
# Holds only rate-limit buckets (bucket4j). In a single-region deployment this
# is also what a pod would subscribe to for SSE, but that collapses to the auth
# host locally, so in practice this store is rate-limit buckets alone.

# Reachable within the private compose network only; passwordless, matching the
# backend's RedisStandaloneConfiguration(host, port) wiring.
bind 0.0.0.0
protected-mode no
port 6379

# No durability (mechanics.md 034 section 1: no AOF, no replication). A restart
# starts every bucket fresh; the per-IP 429 contract tolerates a cold start.
appendonly no
save ""

# Bounded memory with LFU eviction: keep the frequently-hit buckets (active
# clients still being rate-limited) and shed cold idle ones under pressure.
# maxmemory stays under the redis-ratelimit container's memory limit in
# docker-compose.yml so Redis evicts on its own terms before the cgroup OOM-kills.
maxmemory 256mb
maxmemory-policy allkeys-lfu
maxmemory-samples 5
