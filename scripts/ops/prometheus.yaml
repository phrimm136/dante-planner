# Scrape config for the CloudWatch Agent's embedded Prometheus scraper.
# Installed to /opt/aws/amazon-cloudwatch-agent/etc/prometheus.yaml by
# install-cloudwatch-agent.sh; referenced by prometheus_config_path in
# cloudwatch-agent-config.json.
# The backend actuator is reachable only on host loopback (docker-compose.yml
# publishes 127.0.0.1:8080), so this target survives container recreation.
global:
  scrape_interval: 60s
  scrape_timeout: 10s

scrape_configs:
  - job_name: backend
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["127.0.0.1:8080"]
