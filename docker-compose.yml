services:
  backend:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/danteplanner-backend:${IMAGE_TAG}
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        JAVA_OPTS: "-Xms256m -Xmx768m -XX:MaxMetaspaceSize=256m"
    container_name: danteplanner-backend
    restart: "no"
    # Loopback-only: the host CloudWatch Agent scrapes /actuator/prometheus
    # (scripts/ops/prometheus.yaml). Never widen past 127.0.0.1 — the actuator
    # endpoints are unauthenticated.
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./static/data:/app/data:ro
      - ${JWT_KEYS_PATH:-./jwt-keys}:/app/keys:ro
    environment:
      GAME_DATA_PATH: /app/data
      MYSQL_HOST: ${MYSQL_HOST}
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      JWT_PRIVATE_KEY_PATH: ${JWT_PRIVATE_KEY_PATH}
      JWT_PUBLIC_KEY_PATH: ${JWT_PUBLIC_KEY_PATH}
      JWT_ENCRYPTION_KEY: ${JWT_ENCRYPTION_KEY}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET}
      TRUSTED_PROXY_IPS: ${TRUSTED_PROXY_IPS}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SENTRY_DSN: ${SENTRY_DSN:-}
      JAVA_OPTS: "-Xms256m -Xmx768m -XX:MaxMetaspaceSize=256m"
    networks:
      - danteplanner-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    logging:
      driver: awslogs
      options:
        awslogs-region: us-west-2
        awslogs-group: /ecs/danteplanner/backend
        awslogs-create-group: "true"

  nginx:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/danteplanner-nginx:${IMAGE_TAG}
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: danteplanner-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${SSL_CERT_PATH:-./ssl}:/etc/nginx/ssl:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - danteplanner-network
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: awslogs
      options:
        awslogs-region: us-west-2
        awslogs-group: /ecs/danteplanner/nginx
        awslogs-create-group: "true"

# Not mounted by any service — retained as the only copy of the pre-RDS prod
# data (the rollback source). Do NOT `docker compose down -v` or prune it; see
# docs/tasks/030-rds-migration/runbook.md (Zone 4) for the decommission gate.
volumes:
  mysql-data:
    driver: local

networks:
  danteplanner-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.18.0.0/16
