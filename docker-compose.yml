services:
  backend:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/danteplanner-backend:${IMAGE_TAG}
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        JAVA_OPTS: "-Xms256m -Xmx768m -XX:MaxMetaspaceSize=256m"
    container_name: danteplanner-backend
    restart: "no"
    # Loopback-only: the host CloudWatch Agent scrapes /actuator/prometheus
    # (scripts/ops/prometheus.yaml). Never widen past 127.0.0.1 — the actuator
    # endpoints are unauthenticated.
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./static/data:/app/data:ro
      - ${JWT_KEYS_PATH:-./jwt-keys}:/app/keys:ro
    environment:
      GAME_DATA_PATH: /app/data
      MYSQL_HOST: ${MYSQL_HOST}
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      JWT_PRIVATE_KEY_PATH: ${JWT_PRIVATE_KEY_PATH}
      JWT_PUBLIC_KEY_PATH: ${JWT_PUBLIC_KEY_PATH}
      JWT_ENCRYPTION_KEY: ${JWT_ENCRYPTION_KEY}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET}
      TRUSTED_PROXY_IPS: ${TRUSTED_PROXY_IPS}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SENTRY_DSN: ${SENTRY_DSN:-}
      # Redis topology (034 multi-region). auth = durable store (blacklist,
      # rotation, tombstones, SSE pub/sub); rate-limit = ephemeral buckets;
      # sse-local = the pod's local subscribe target (= auth host single-region).
      # Hosts default to the compose service names; override via env for a
      # managed or multi-region endpoint.
      AUTH_REDIS_HOST: ${AUTH_REDIS_HOST:-redis-auth}
      AUTH_REDIS_PORT: ${AUTH_REDIS_PORT:-6379}
      RATE_LIMIT_REDIS_HOST: ${RATE_LIMIT_REDIS_HOST:-redis-ratelimit}
      RATE_LIMIT_REDIS_PORT: ${RATE_LIMIT_REDIS_PORT:-6379}
      SSE_LOCAL_REDIS_HOST: ${SSE_LOCAL_REDIS_HOST:-redis-auth}
      SSE_LOCAL_REDIS_PORT: ${SSE_LOCAL_REDIS_PORT:-6379}
      JAVA_OPTS: "-Xms256m -Xmx768m -XX:MaxMetaspaceSize=256m"
    depends_on:
      redis-auth:
        condition: service_healthy
      redis-ratelimit:
        condition: service_healthy
    networks:
      - danteplanner-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    logging:
      driver: awslogs
      options:
        awslogs-region: us-west-2
        awslogs-group: /ecs/danteplanner/backend
        awslogs-create-group: "true"

  nginx:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/danteplanner-nginx:${IMAGE_TAG}
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: danteplanner-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${SSL_CERT_PATH:-./ssl}:/etc/nginx/ssl:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - danteplanner-network
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: awslogs
      options:
        awslogs-region: us-west-2
        awslogs-group: /ecs/danteplanner/nginx
        awslogs-create-group: "true"

  # Durable auth store (034 mechanics section 1): AOF everysec + RDB preamble,
  # noeviction. Also serves the single-region sse-local subscribe target.
  redis-auth:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/danteplanner-redis:${IMAGE_TAG}
    build:
      context: ./redis
      dockerfile: Dockerfile
    container_name: danteplanner-redis-auth
    restart: unless-stopped
    command: ["redis-server", "/etc/redis/redis-auth.conf"]
    volumes:
      - redis-auth-data:/data
    networks:
      - danteplanner-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: awslogs
      options:
        awslogs-region: us-west-2
        awslogs-group: /ecs/danteplanner/redis-auth
        awslogs-create-group: "true"

  # Per-region ephemeral rate-limit store: no persistence, memory-bounded (see
  # redis-ephemeral.conf). Same image as redis-auth, different command/config.
  redis-ratelimit:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/danteplanner-redis:${IMAGE_TAG}
    build:
      context: ./redis
      dockerfile: Dockerfile
    container_name: danteplanner-redis-ratelimit
    restart: unless-stopped
    command: ["redis-server", "/etc/redis/redis-ephemeral.conf"]
    networks:
      - danteplanner-network
    deploy:
      resources:
        limits:
          memory: 320M
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: awslogs
      options:
        awslogs-region: us-west-2
        awslogs-group: /ecs/danteplanner/redis-ratelimit
        awslogs-create-group: "true"

# Not mounted by any service — retained as the only copy of the pre-RDS prod
# data (the rollback source). Do NOT `docker compose down -v` or prune it; see
# docs/tasks/030-rds-migration/runbook.md (Zone 4) for the decommission gate.
volumes:
  mysql-data:
    driver: local
  # Durable auth Redis AOF/RDB. In prod it rebuilds from replication; losing it
  # locally just clears blacklist/rotation/tombstone state (fail-open by design).
  redis-auth-data:
    driver: local

networks:
  danteplanner-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.18.0.0/16
